  <style rel="stylesheet" crossorigin>:root{--bg-primary: #0a0b10;--bg-secondary: #161821;--bg-accent: #1e2230;--text-primary: #f8f9fa;--text-secondary: #adb5bd;--text-muted: #6c757d;--accent-color: #6366f1;--accent-hover: #4f46e5;--accent-glow: rgba(99, 102, 241, .3);--success: #10b981;--warning: #f59e0b;--danger: #ef4444;--radius-sm: 4px;--radius-md: 8px;--radius-lg: 16px;--spacing-xs: 4px;--spacing-sm: 8px;--spacing-md: 16px;--spacing-lg: 24px;--spacing-xl: 32px;--shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, .05);--shadow-md: 0 4px 6px -1px rgba(0, 0, 0, .1), 0 2px 4px -1px rgba(0, 0, 0, .06);--shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, .1), 0 4px 6px -2px rgba(0, 0, 0, .05);--glass-bg: rgba(22, 24, 33, .7);--glass-border: rgba(255, 255, 255, .1)}*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{font-family:Inter,Outfit,sans-serif;background-color:var(--bg-primary);color:var(--text-primary);line-height:1.5;overflow:hidden;width:100vw;height:100vh}#app-container{width:100%;height:100%;display:flex;flex-direction:column}#main-content{flex:1;overflow-y:auto;position:relative;padding-bottom:80px}.game-header{background-color:var(--bg-secondary);padding:var(--spacing-sm) var(--spacing-lg);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--glass-border);box-shadow:var(--shadow-md);z-index:110}.game-header h1{font-family:Outfit,sans-serif;font-size:1.25rem;font-weight:700;background:linear-gradient(135deg,var(--text-primary),var(--accent-color));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.stats-bar{display:flex;gap:var(--spacing-sm)}.stat-item{background:var(--bg-accent);padding:4px 12px;border-radius:var(--radius-lg);font-size:.85rem;border:1px solid var(--glass-border);display:flex;align-items:center;gap:var(--spacing-xs)}.stat-item .icon{font-size:1rem}.stat-item .value{color:var(--accent-color);font-weight:700}.main-nav{position:fixed;bottom:0;left:0;right:0;height:70px;backg <body>
    <div id="app-container">
        <!-- Global Header: Persistence across views -->
        <header class="game-header">
            <div class="brand">
                <h1>RPG Village</h1>
            </div>
            <div class="stats-bar">
                <div class="stat-item" title="Gold">
                    <span class="icon">💰</span>
                    <span id="gold-count" class="value">0</span>
                </div>
                <div class="stat-item" title="Villagers">
                    <span class="icon">👤</span>
                    <span id="villager-count" class="value">0</span>
                </div>
                <div class="stat-item" title="Materials">
                    <span class="icon">🪵</span>
                    <span id="wood-count" class="value">0</span>
                </div>
            </div>
        </header>

        <!-- Main Content Area: Views are injected here -->
        <main id="main-content">
            <div class="loader-overlay" id="main-loader">
                <div class="spinner"></div>
            </div>
        </main>

        <!-- Global Navigation -->
        <nav class="main-nav">
            <button class="nav-item active" data-view="village">
                <span class="nav-icon">🏡</span>
                <span class="nav-label" data-i18n="nav_village">Village</span>
            </button>
            <button class="nav-item" data-view="buildings">
                <span class="nav-icon">⚒️</span>
                <span class="nav-label" data-i18n="nav_buildings">Buildings</span>
            </button>
            <button class="nav-item" data-view="heroes">
                <span class="nav-icon">⚔️</span>
                <span class="nav-label" data-i18n="nav_heroes">Heroes</span>
            </button>
            <button class="nav-item" data-view="inventory">
                <span class="nav-icon">🎒</span>
                <span class="nav-label" data-i18n="nav_inventory">Inventory</span>
            </button>
            <button class="nav-item" data-view="explore">
                <span class="nav-icon">🗺️</span>
                <span class="nav-label" data-i18n="nav_explore">Explore</span>
            </button>
        </nav>
    </div>

    <!-- View Templates (Inlined at build-time) -->
    <template id="tpl-village"><section id="village-view" class="domain-view">
    <div class="dashboard-grid">
        <!-- Village Status Widget -->
        <div class="card widget status-widget">
            <h3 data-i18n="ui_village_status">Village Status</h3>
            <div class="status-content">
                <div class="status-item">
                    <span class="label" data-i18n="village_population">Population</span>:
                    <span id="village-pop" class="value">--</span>
                </div>
                <div class="status-item">
                    <span class="label" data-i18n="village_day">Day</span>:
                    <span id="village-day" class="value">--</span>
                </div>
            </div>
        </div>

        <!-- Construction Queue Widget -->
        <div class="card widget construction-widget">
            <h3 data-i18n="ui_construction">Construction</h3>
            <div id="construction-list" class="empty-state" data-i18n="ui_no_projects">
                No active projects.
            </div>
        </div>

        <!-- Village Canvas (Visual Center) -->
        <div class="card widget canvas-widget">
            <div class="village-visual-placeholder">
                <div class="visual-placeholder-text" data-i18n="ui_visual_rep">
                    [Village Visual Representation]
                </div>
            </div>
        </div>
    </div>
</section>
</template>
    <template id="tpl-buildings"><section id="buildings-view" class="domain-view">
    <div class="master-detail-layout">
        <div class="master-pane">
            <div class="section-header">
                <h3 data-i18n="ui_available_buildings">Available Buildings</h3>
            </div>
            <div id="buildings-list" class="entity-list">
                <!-- Buildings will be injected here -->
            </div>
        </div>
        <div class="detail-pane">
            <div id="building-details" class="empty-detail" data-i18n="ui_select_building">
                Select a building to see details.
            </div>
        </div>
    </div>
</section>
</template>
    <template id="tpl-heroes"><section id="heroes-view" class="domain-view">
    <div class="master-detail-layout">
        <div class="master-pane">
            <div class="section-header">
                <h3 data-i18n="ui_your_heroes">Your Heroes</h3>
                <button class="btn-secondary btn-sm" id="btn-recruit" data-i18n="ui_recruit">Recruit</button>
            </div>
            <div id="heroes-list" class="entity-list">
                <!-- Heroes list -->
            </div>
        </div>
        <div class="detail-pane">
            <div id="hero-details" class="empty-detail" data-i18n="ui_select_hero">
                Select a hero to view stats and equipment.
            </div>
        </div>
    </div>
</section>
</template>
    <template id="tpl-inventory"><section id="inventory-view" class="domain-view">
    <div class="inventory-layout">
        <div class="inventory-categories">
            <button class="cat-item active" data-cat="all" data-i18n="ui_all">All</button>
            <button class="cat-item" data-cat="materials" data-i18n="ui_materials">Materials</button>
            <button class="cat-item" data-cat="consumables" data-i18n="ui_consumables">Consumables</button>
            <button class="cat-item" data-cat="equipment" data-i18n="ui_equipment">Equipment</button>
        </div>
        <div id="inventory-grid" class="item-grid">
            <!-- Items injected here -->
        </div>
    </div>
</section>
</template>
    <template id="tpl-explore"><section id="explore-view" class="domain-view">
    <div class="explore-layout">
        <div class="explore-map">
            <!-- Map visualization placeholder -->
            <div class="map-placeholder">
                <div class="visual-placeholder-text" data-i18n="ui_world_map">World Map</div>
            </div>
        </div>
        <div class="expeditions-panel">
            <h3 data-i18n="ui_active_expeditions">Active Expeditions</h3>
            <div id="active-expeditions" class="expedition-list">
                <div class="empty-state" data-i18n="ui_no_active_expeditions">No active expeditions.</div>
            </div>
            <button id="btn-new-expedition" class="btn-primary" data-i18n="ui_start_expedition">Start Expedition</button>
        </div>
    </div>
</section>
</template>

    <!-- Application Entry Point -->
</body>
</html>
