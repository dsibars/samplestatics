<body>
    <div id="app-container">
        <!-- Global Header: Persistence across views -->
        <header class="game-header">
            <div class="brand">
                <h1>RPG Village</h1>
            </div>
            <div class="global-day-cycle">
                <span class="day-label" data-i18n="village_day">Day</span>
                <span id="global-day" class="day-value">--</span>
                <button id="btn-global-next-day" class="btn btn-primary btn-sm shine-effect" style="padding: 6px 12px; font-size: 0.85rem;">
                    <span class="icon">☀️</span> <span data-i18n="btn_next_day" class="hide-mobile">Next Day</span>
                </button>
            </div>
            <div class="stats-bar">
                <div class="stat-item" title="Gold">
                    <span class="icon">💰</span>
                    <span id="gold-count" class="value">0</span>
                </div>
                <div class="stat-item" title="Villagers">
                    <span class="icon">👤</span>
                    <span id="villager-count" class="value">0</span>
                </div>
                <div class="stat-item" title="Materials">
                    <span class="icon">🪵</span>
                    <span id="wood-count" class="value">0</span>
                </div>
            </div>
        </header>

        <!-- Main Content Area: Views are injected here -->
        <main id="main-content">
            <div class="loader-overlay" id="main-loader">
                <div class="spinner"></div>
            </div>
        </main>

        <!-- Global Navigation -->
        <nav class="main-nav">
            <button class="nav-item active" data-view="village">
                <span class="nav-icon">🏡</span>
                <span class="nav-label" data-i18n="nav_village">Village</span>
            </button>
            <button class="nav-item" data-view="buildings">
                <span class="nav-icon">⚒️</span>
                <span class="nav-label" data-i18n="nav_buildings">Buildings</span>
            </button>
            <button class="nav-item" data-view="heroes">
                <span class="nav-icon">⚔️</span>
                <span class="nav-label" data-i18n="nav_heroes">Heroes</span>
            </button>
            <button class="nav-item" data-view="inventory">
                <span class="nav-icon">🎒</span>
                <span class="nav-label" data-i18n="nav_inventory">Inventory</span>
            </button>
            <button class="nav-item" data-view="explore">
                <span class="nav-icon">🗺️</span>
                <span class="nav-label" data-i18n="nav_explore">Explore</span>
            </button>
            <button class="nav-item" data-view="shop">
                <span class="nav-icon">🛒</span>
                <span class="nav-label" data-i18n="nav_shop">Shop</span>
            </button>
            <button class="nav-item" data-view="forge">
                <span class="nav-icon">🔥</span>
                <span class="nav-label" data-i18n="nav_forge">Forge</span>
            </button>
            <button class="nav-item" data-view="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label" data-i18n="nav_settings">Settings</span>
            </button>
        </nav>
    </div>

    <!-- View Templates (Inlined at build-time) -->
    <template id="tpl-village"><section id="village-view" class="domain-view">
    <div class="dashboard-grid">
        <!-- Left Column: Status & Queue -->
        <div class="side-panel">
            <!-- Village Status Widget -->
            <div class="card widget status-widget">
                <h3 data-i18n="ui_village_status">Village Status</h3>
                <div class="status-content">
                    <div class="status-item-detailed">
                        <div class="status-row">
                            <span class="label" data-i18n="village_gold">Gold</span>
                            <span id="village-gold" class="value">--</span>
                        </div>
                    </div>
                    
                    <div class="status-item-detailed">
                        <div class="status-row">
                            <span class="label" data-i18n="village_population">Population</span>
                            <span id="village-pop" class="value">--</span>
                        </div>
                        <div class="sub-label">
                            <span data-i18n="ui_available">Available</span>: <span id="village-pop-avail" class="accent-text">--</span>
                        </div>
                    </div>

                    <div class="status-item-detailed">
                        <div class="status-row">
                            <span class="label" data-i18n="inv_storage">Storage</span>
                            <span id="village-storage-text" class="value">-- / --</span>
                        </div>
                        <div class="progress-container">
                            <div id="village-storage-bar" class="progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Construction Queue Widget -->
            <div class="card widget construction-widget">
                <h3 data-i18n="ui_construction">Construction</h3>
                <div id="construction-list-container">
                    <div id="construction-list" class="empty-state" data-i18n="ui_no_projects">
                        No active projects.
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Visual Center & Global Actions -->
        <div class="main-panel">


            <div id="daily-report-container"></div>
            
            <div id="village-canvas-container">
                <!-- Dynamic village tiles will be rendered here -->
            </div>
        </div>
    </div>
</section>

<style>
    .status-item-detailed {
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .status-row .label { color: var(--text-muted); font-size: 0.9rem; }
    .status-row .value { font-weight: 700; color: var(--text-primary); }
    .accent-text { color: var(--accent-color); font-weight: 700; }
    
    .action-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: var(--spacing-md);
        background: linear-gradient(to right, var(--bg-accent), var(--bg-secondary));
    }
    
    .day-cycle-info {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 20px;
        border-right: 1px solid var(--glass-border);
    }
    
    .day-label { font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); }
    .day-value { font-size: 2rem; font-weight: 900; color: var(--accent-color); }
    
    .action-bar-centered {
        flex: 1;
        display: flex;
        justify-content: center;
    }

    .side-panel { display: flex; flex-direction: column; gap: var(--spacing-md); }
    .main-panel { display: flex; flex-direction: column; gap: var(--spacing-md); }
    
    .daily-report-widget { border-left: 4px solid var(--accent-color); }
    .report-content { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
    .report-section { display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 4px; }
    .report-section.success { border-left: 3px solid #4CAF50; }
    .report-section.danger { border-left: 3px solid #f44336; color: #f44336; }
    .report-icon { font-size: 1.2rem; }

    @media (max-width: 767px) {
        .action-card { flex-direction: column; gap: var(--spacing-md); text-align: center; }
        .day-cycle-info { border-right: none; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; width: 100%; }
    }
</style>
</template>
    <template id="tpl-buildings"><section id="buildings-view" class="domain-view">
    <div class="master-detail-layout">
        <!-- Master Pane: List of Buildings -->
        <aside class="master-pane card">
            <h3 data-i18n="ui_available_buildings">Buildings</h3>
            <div id="buildings-list-container" class="list-container">
                <!-- Building cards will be injected here -->
            </div>
        </aside>

        <!-- Detail Pane: Building Information & Actions -->
        <main class="detail-pane card glass-pane">
            <div id="building-detail-content">
                <div class="empty-detail">
                    <div class="detail-icon-bg">⚒️</div>
                    <p data-i18n="ui_select_building">Select a building to view construction options.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Template for a building card (injected via JS) -->
    <template id="tpl-building-card">
        <div class="list-item building-card" data-id="">
            <div class="list-item-header">
                <span class="list-item-title"></span>
                <span class="list-item-level"></span>
            </div>
            <div class="progress-container hidden">
                <div class="progress-bar warning" style="width: 0%"></div>
            </div>
        </div>
    </template>
</section>

<style>
    .glass-pane {
        background: rgba(22, 24, 33, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        flex-direction: column;
    }

    .detail-icon-bg {
        font-size: 4rem;
        opacity: 0.1;
        margin-bottom: 20px;
    }

    .empty-detail {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: var(--text-muted);
    }

    /* Building Profile Styles */
    .building-profile-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--glass-border);
    }

    .profile-title-group h2 {
        font-family: 'Outfit', sans-serif;
        font-size: 2rem;
        color: var(--text-primary);
    }

    .profile-badge {
        background: var(--accent-color);
        color: white;
        padding: 4px 12px;
        border-radius: var(--radius-lg);
        font-size: 0.9rem;
        font-weight: 800;
    }

    .upgrade-section {
        background: rgba(0,0,0,0.2);
        padding: 20px;
        border-radius: var(--radius-md);
        border: 1px solid var(--glass-border);
    }

    .cost-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin: 20px 0;
    }

    .cost-item {
        background: var(--bg-accent);
        padding: 10px;
        border-radius: var(--radius-sm);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .cost-item.insufficient {
        border: 1px solid var(--danger);
        color: var(--danger);
    }

    .cost-item .label { font-size: 0.8rem; opacity: 0.7; }
    .cost-item .value { font-weight: 700; }

    .action-footer {
        margin-top: 30px;
        display: flex;
        justify-content: flex-end;
    }
</style>
</template>

        <aside class="master-pane card">

    .pane-header {
        display: flex;

        border-radius: var(--radius-sm);
