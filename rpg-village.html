da de la tierra que una vez llamamos hogar. Impulsados por la necesidad y la supervivencia, reunimos lo poco que pudimos llevar y huimos del caos creciente.",prologue_title_2:"Capítulo II: El Largo Viaje",prologue_lore_2:"Guiados por un héroe valiente, nuestra pequeña caravana se aventuró en las alturas heladas del paso de montaña. El viento era implacable, la comida escasa y la desesperación amenazaba con apoderarse de nosotros. Sin embargo, a través del frío y el agotamiento, seguimos adelante, manteniéndonos con vida gracias a la promesa de un mañana en paz.",prologue_title_3:"Capítulo III: Un Refugio Encontrado",prologue_lore_3:"Descendiendo de los acantilados escarpados, descubrimos un valle remoto, oculto del mundo exterior por un denso manto de niebla. Aquí, la tierra es fértil y el agua corre pura. En este santuario, construiremos nuestra nueva aldea y reconstruiremos nuestras vidas, paso a paso.",prologue_btn_back:"Atrás",prologue_btn_next:"Siguiente",ui_btn_cancel:"Cancelar",ui_btn_confirm:"Confirmar Borrado",ui_daily_report_title:"Reporte Diario - Día {day}",ui_report_food:"{amount} Comida Consumida",ui_report_starvation:"¡ADVERTENCIA: La aldea se muere de hambre!",ui_report_growth:"¡{amount} Aldeano se ha unido a la aldea!",ui_report_built:"Completado:",ui_report_exp_progress:"La expedición {name} avanzó una etapa.",ui_report_exp_completed:"¡Expedición {name} completada! Encontrado: {rewards}",ui_report_exp_failed:"La expedición {name} se retiró.",ui_assigned_expedition:"Expedición Asignada",ui_waiting_combat:"Esperando al siguiente día para comenzar el combate.",ui_progress_combat:"La expedición está en curso. El progreso ocurre al avanzar el día.",ui_unassign_retire:"Desasignar Todos / Retirarse",ui_another_active:"Otra expedición está activa actualmente. No puedes asignar héroes aquí.",ui_roster_locked:"Expedición bloqueada. Actualmente asignados:",ui_no_idle_heroes:"No hay héroes inactivos disponibles.",ui_assign_heroes:"Asignar Héroes",ui_update_ass  santuari de pau. El viatge ha estat llarg i els recursos són escassos, però l'esperança encara perdura.",intro_btn:"Començar Viatge",prologue_title_1:"Capítol I: Les Cendres del Passat",prologue_lore_1:"En un món consumit per les flames d'una guerra eterna, l'antic regne ha caigut. Cendres i ruïnes és tot el que queda de la terra que un cop vam anomenar llar. Impulsats per la necessitat i la supervivència, vam recollir el poc que podíem portar i vam fugir del caos creixent.",prologue_title_2:"Capítol II: El Llarg Viatge",prologue_lore_2:"Guiats per un heroi valent, la nostra petita caravana es va aventurar a les altures gelades del pas de muntanya. El vent era implacable, el menjar escàs i la desesperació amenaçava amb apoderar-se de nosaltres. No obstant això, a través del fred i l'esgotament, vam seguir endavant, mantenint-nos vius gràcies a la promesa d'un demà en pau.",prologue_title_3:"Capítol III: Un Refugi Trobat",prologue_lore_3:"Descendint dels penya-segats escarpats, vam descobrir una vall remota, oculta del món exterior per un dens mantell de boira. Aquí, la terra és fèrtil i l'aigua corre pura. En aquest santuari, construirem la nostra nova aldea i reconstruirem les nostres vides, pas a pas.",prologue_btn_back:"Enrere",prologue_btn_next:"Següent",btn_auto_combat:"Auto-Combat",btn_skip_combat:"Saltar Batalla",ui_choose_target:"Triar Objectiu"},_e={btn_back:"BUELTATU",btn_confirm:"BAIEZTATU",btn_cancel:"UZTU",btn_next_day:"HURRENGO EGUNA",village_gold:"Urrea",village_population:"Biztanleria",village_day:"Eguna",village_housing:"Etxebizitzak",village_warehouse:"Biltegia",village_farm:"Baserria",village_blacksmith:"Aroztegia",village_training_grounds:"Entrenamendu Zelaia",village_explorer_guild:"Esploratzaileen Gremioa",material_wood:"Egurre",material_stone:"Harria",material_iron_ore:"Burdin Minerala",material_steel_ingot:"Altzairuzko Ingotea",material_mythril:"Mythril",food_raw_grain:"Gia",food_meat:"Haragia",food_bread:"Ogia",food_stew:"Egu egina",inv_sto <body>
    <div id="app-container">
        <!-- Global Header: Persistence across views -->
        <header class="game-header">
            <div class="brand">
                <h1>RPG Village</h1>
            </div>
            <div class="stats-bar">
                <div class="stat-item" title="Gold">
                    <span class="icon">💰</span>
                    <span id="gold-count" class="value">0</span>
                </div>
                <div class="stat-item" title="Villagers">
                    <span class="icon">👤</span>
                    <span id="villager-count" class="value">0</span>
                </div>
                <div class="stat-item" title="Materials">
                    <span class="icon">🪵</span>
                    <span id="wood-count" class="value">0</span>
                </div>
            </div>
        </header>

        <!-- Main Content Area: Views are injected here -->
        <main id="main-content">
            <div class="loader-overlay" id="main-loader">
                <div class="spinner"></div>
            </div>
        </main>

        <!-- Global Navigation -->
        <nav class="main-nav">
            <button class="nav-item active" data-view="village">
                <span class="nav-icon">🏡</span>
                <span class="nav-label" data-i18n="nav_village">Village</span>
            </button>
            <button class="nav-item" data-view="buildings">
                <span class="nav-icon">⚒️</span>
                <span class="nav-label" data-i18n="nav_buildings">Buildings</span>
            </button>
            <button class="nav-item" data-view="heroes">
                <span class="nav-icon">⚔️</span>
                <span class="nav-label" data-i18n="nav_heroes">Heroes</span>
            </button>
            <button class="nav-item" data-view="inventory">
                <span class="nav-icon">🎒</span>
                <span class="nav-label" data-i18n="nav_inventory">Inventory</span>
            </button>
            <button class="nav-item" data-view="explore">
                <span class="nav-icon">🗺️</span>
                <span class="nav-label" data-i18n="nav_explore">Explore</span>
            </button>
            <button class="nav-item" data-view="shop">
                <span class="nav-icon">🛒</span>
                <span class="nav-label" data-i18n="nav_shop">Shop</span>
            </button>
            <button class="nav-item" data-view="forge">
                <span class="nav-icon">🔥</span>
                <span class="nav-label" data-i18n="nav_forge">Forge</span>
            </button>
            <button class="nav-item" data-view="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label" data-i18n="nav_settings">Settings</span>
            </button>
        </nav>
    </div>

    <!-- View Templates (Inlined at build-time) -->
    <template id="tpl-village"><section id="village-view" class="domain-view">
    <div class="dashboard-grid">
        <!-- Left Column: Status & Queue -->
        <div class="side-panel">
            <!-- Village Status Widget -->
            <div class="card widget status-widget">
                <h3 data-i18n="ui_village_status">Village Status</h3>
                <div class="status-content">
                    <div class="status-item-detailed">
                        <div class="status-row">
                            <span class="label" data-i18n="village_gold">Gold</span>
                            <span id="village-gold" class="value">--</span>
                        </div>
                    </div>
                    
                    <div class="status-item-detailed">
                        <div class="status-row">
                            <span class="label" data-i18n="village_population">Population</span>
                            <span id="village-pop" class="value">--</span>
                        </div>
                        <div class="sub-label">
                            <span data-i18n="ui_available">Available</span>: <span id="village-pop-avail" class="accent-text">--</span>
                        </div>
                    </div>

                    <div class="status-item-detailed">
                        <div class="status-row">
                            <span class="label" data-i18n="inv_storage">Storage</span>
                            <span id="village-storage-text" class="value">-- / --</span>
                        </div>
                        <div class="progress-container">
                            <div id="village-storage-bar" class="progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Construction Queue Widget -->
            <div class="card widget construction-widget">
                <h3 data-i18n="ui_construction">Construction</h3>
                <div id="construction-list-container">
                    <div id="construction-list" class="empty-state" data-i18n="ui_no_projects">
                        No active projects.
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Visual Center & Global Actions -->
        <div class="main-panel">
            <!-- Day Cycle Controller (The "Big Button" Area) -->
            <div class="card action-card" style="margin-top: 0; margin-bottom: 10px;">
                <div class="day-cycle-info">
                    <span class="day-label" data-i18n="village_day">Day</span>
                    <span id="village-day" class="day-value">--</span>
                </div>
                
                <div class="action-bar-centered">
                    <button id="btn-next-day" class="btn btn-primary btn-lg shine-effect">
                        <span class="icon">☀️</span>
                        <span data-i18n="btn_next_day">Next Day</span>
                    </button>
                </div>
            </div>

            <div id="daily-report-container"></div>
            
            <div id="village-canvas-container">
                <!-- Dynamic village tiles will be rendered here -->
            </div>
        </div>
    </div>
</section>

<style>
    .status-item-detailed {
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .status-row .label { color: var(--text-muted); font-size: 0.9rem; }
    .status-row .value { font-weight: 700; color: var(--text-primary); }
    .accent-text { color: var(--accent-color); font-weight: 700; }
    
    .action-card {
