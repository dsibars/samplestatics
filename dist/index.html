<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Static Apps Hub</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .app-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }
        .app-card {
            background: #1e293b;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #334155;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .app-card:hover {
            transform: translateY(-5px);
            border-color: #6366f1;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            background: #273549;
        }
        .app-card h2 {
            margin: 0;
            font-size: 1.5rem;
            color: #38bdf8;
        }
        .app-card p {
            margin: 0;
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.5;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            background: #0ea5e9;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <h1>App Hub</h1>
    <div class="app-list">
        <a href="./daily-routine-exercise.html" class="app-card">
            <span class="badge">Static App</span>
            <h2>Daily Routine Exercise</h2>
            <p>A simple 15-minute workout tracker with history and statistics.</p>
        </a>
        <!-- Add more apps here manually as we create them -->
    </div>
</body>
</html>
