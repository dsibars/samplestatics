<body>

  <!-- ==========================================
       HTML STRUCTURE (VIEWS)
       ========================================== -->
    <!-- View: Welcome & Actions Menu -->
  <div id="view-welcome" class="view active">
    <!-- Settings Icon -->
    <div style="position: absolute; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; -webkit-tap-highlight-color: transparent;" onclick="showSettings()">⚙️</div>

    <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 5px;">
      <h2 id="display-date" style="margin: 0;"></h2>
      <button id="btn-today" onclick="resetToToday()" style="background: #4CAF50; color: white; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 0.8rem; font-weight: bold; display: none;" data-i18n="today_btn">HOY</button>
    </div>
    
    <div id="check-msg" style="margin-bottom: 20px;"></div>
    
    <button class="next-btn" onclick="startWorkout()" data-i18n="start_workout">EMPEZAR ENTRENAMIENTO</button>
    <button class="next-btn" style="background:#455a64" onclick="showHistory()" data-i18n="view_history">VER HISTORIAL 📊</button>
    <button class="next-btn" style="background:#333" onclick="showExit()" data-i18n="not_today">HOY NO, GRACIAS</button>
  </div>

    <!-- View: Settings / Configuration -->
  <div id="view-settings" class="view">
    <h2 data-i18n="settings">AJUSTES ⚙️</h2>
    
    <div style="text-align: left; max-width: 400px; margin: 0 auto;">
      <label data-i18n="language">Idioma</label>
      <select id="lang-selector" onchange="changeLanguage()" style="width: 100%; padding: 12px; background: #222; color: white; border: 1px solid #444; border-radius: 8px; margin-bottom: 20px; font-size: 1rem;">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="ca">Català</option>
        <option value="eu">Euskera</option>
        <option value="gl">Galego</option>
      </select>

      <label data-i18n="change_date">Cambiar fecha actual</label>
      <input type="date" id="date-hacker" onchange="updateActiveDate(this.value)" style="width: 100%; box-sizing: border-box;">

      <label data-i18n="routine">Rutina</label>
      <button class="next-btn" style="background:#3949ab; width: 100%; margin: 5px 0 20px 0; font-size: 0.9rem;" onclick="showRoutine()" data-i18n="edit_routine">EDITAR RUTINA ✏️</button>
    </div>

    <!-- Utilities moved from welcome -->
    <div style="margin-top: 20px; border-top: 1px solid #333; padding-top: 20px;">
      <label style="text-align: center;" data-i18n="local_data">Datos locales</label>
      <button class="next-btn" style="background:#263238; font-size:0.8rem; padding:10px;" onclick="exportJSON()" data-i18n="export_json">EXPORTAR JSON</button>
      <button class="next-btn" style="background:#263238; font-size:0.8rem; padding:10px;" onclick="document.getElementById('fileInput').click()" data-i18n="import_json">IMPORTAR JSON</button>
      <input type="file" id="fileInput" style="display:none" onchange="importJSON(event)" accept=".json">
      <button class="next-btn" style="background:#b71c1c; font-size: 0.7rem; padding: 10px;" onclick="clearAllData()" data-i18n="erase_history">BORRAR TODO EL HISTORIAL</button>
    </div>

    <button class="next-btn" style="background:#333; margin-top: 20px;" onclick="closeSettings()" data-i18n="back">VOLVER</button>
  </div>

    <!-- View: Routine Reader / Editor -->
  <div id="view-routine" class="view">
    <h2 data-i18n="routine">Rutina</h2>
    
    <button class="next-btn" style="background: transparent; border: 2px dashed #4CAF50; color: #4CAF50; width: 100%; max-width: 450px; padding: 15px; margin-bottom: 15px;" onclick="openAddExercise()" data-i18n="add_exercise">+ AÑADIR EJERCICIO</button>

    <div id="routine-list" style="text-align:left; margin-bottom: 20px; max-width: 450px; margin: 0 auto;">
      <!-- Populated via JS JS -->
    </div>
    
    <button class="next-btn" style="background:#333; margin-top: 20px;" onclick="closeRoutine()" data-i18n="back">VOLVER</button>
  </div>

    <!-- View: Add Exercise Builder -->
  <div id="view-add-exercise" class="view">
    <h2 style="color: #4CAF50" data-i18n="add_exercise">+ AÑADIR</h2>
    
    <div style="text-align: left; max-width: 400px; margin: 0 auto;">
      <label data-i18n="select_exercise">Seleccionar Ejercicio</label>
      <select id="builder-ex" onchange="updateExercisePreview()" style="width: 100%; padding: 12px; background: #222; color: white; border: 1px solid #4CAF50; border-radius: 8px; margin-bottom: 5px; font-size: 1rem;">
        <!-- Populated dynamically via JS -->
      </select>
      
      <div id="builder-desc" style="font-size: 0.85rem; color: #aaa; margin-bottom: 20px; font-style: italic; min-height: 40px;">
        <!-- Dynamic desc -->
      </div>

      <label data-i18n="reps">Objetivo (Reps/Segs)</label>
      <input type="number" id="builder-start" value="10" min="0" style="width: 100%; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; box-sizing: border-box; margin-bottom: 20px;">

      <label data-i18n="tag">Etiqueta (Opcional)</label>
      <input type="text" id="builder-tag" placeholder="Ej: Calentamiento, Al Fallo..." style="width: 100%; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; box-sizing: border-box; margin-bottom: 20px;">
    </div>
    
    <button class="next-btn" style="background:#4CAF50; margin-top: 10px;" onclick="appendNewExercise()" data-i18n="add_to_routine">AÑADIR A LA RUTINA</button>
    <button class="next-btn" style="background:#333; margin-top: 10px;" onclick="closeAddExercise()" data-i18n="back">CANCELAR</button>
  </div>

    <!-- View: Active Workout Engine -->
  <div id="workout-engine" class="view">
    <!-- Populated dynamically via JS renderStep() -->
  </div>

    <!-- View: Post Workout Summary -->
