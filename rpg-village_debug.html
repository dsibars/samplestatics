class UIController {
  constructor() {
    this.elements = {
      goldCount: document.getElementById("gold-count"),
      villagerCount: document.getElementById("villager-count"),
      btnStart: document.getElementById("btn-start"),
      navItems: document.querySelectorAll(".nav-item")
    };
    this.setupEventListeners();
  }
  setupEventListeners() {
    this.elements.navItems.forEach((item) => {
      item.addEventListener("click", () => {
        this.setActiveNav(item);
      });
    });
  }
  setActiveNav(item) {
    this.elements.navItems.forEach((i) => i.classList.remove("active"));
    item.classList.add("active");
    const view = item.getAttribute("data-view");
    console.log(`Switching to view: ${view}`);
  }
  updateStats(state) {
    if (this.elements.goldCount) {
      this.elements.goldCount.textContent = Math.floor(state.gold);
    }
    if (this.elements.villagerCount) {
      this.elements.villagerCount.textContent = state.villagers;
    }
  }
  onInitialize(callback) {
    if (this.elements.btnStart) {
      this.elements.btnStart.addEventListener("click", callback);
    }
  }
}

class Hero {
  constructor(data) {

    this.statusEffects = data.statusEffects || [];
    this.phoenixUsed = data.phoenixUsed || false;
    this.equipment = data.equipment || {
      head: null,
      body: null,
      legs: null,
      leftHand: null,
      rightHand: null,
      accessory: null
    };
    this.recalculateStats();
  }
  getTraitMultipliers() {
    const mults = {
      maxHp: 1,
      maxMp: 1,
      strength: 1,
      speed: 1,
      defense: 1,
      magicPower: 1,
      critChance: 0,
      accuracy: 1,
      goldBonus: 1,
      mpRecovery: 1
    };
    switch (this.origin) {
      case "origin_clown":
        mults.critChance += 15;
        mults.accuracy -= 0.05;
        break;
      case "origin_warrior":
        mults.defense *= 1.1;
        mults.maxHp *= 1.05;
        break;
      case "origin_thief":
        mults.speed *= 1.1;
        mults.goldBonus *= 1.1;
        break;
      case "origin_farmer":
        mults.maxHp *= 1.15;
        break;
      case "origin_monk":
        mults.maxMp *= 1.15;
        mults.mpRecovery *= 1.2;
        break;
      case "origin_cook":
        mults.maxHp *= 1.05;
        break;
      case "origin_guard":
        mults.defense *= 1.15;
        break;
      case "origin_poet":
        mults.maxMp *= 1.1;
        mults.magicPower *= 1.1;
        break;
    }
    return mults;
  }
  recalculateStats(villageUpgrades = {}) {
    const traitMults = this.getTraitMultipliers();
    let equipBonus = {
      maxHp: 0,
      maxMp: 0,
      strength: 0,
      speed: 0,
      defense: 0,
      magicPower: 0,
      evasion: 0,
      critChance: 0,
      accuracy: 0,
      mpCostReduction: 0,
      vampirism: 0,
      hasPhoenix: false
    };
    Object.values(this.equipment).forEach((item) => {
      if (!item) return;
      if (item.type === "weapon") {
        const family = WEAPON_FAMILIES[item.family];
        const tier = MATERIAL_TIERS[item.material];
        if (family && tier) {
          const upgradeMult = Math.pow(1.1, item.level || 0);
          const itemPower = 2 * tier.mult * upgradeMult;
          equipBonus.strength += itemPower * family.dmgMult;
          equipBonus.speed += family.spdBonus;
          equipBonus.evasion += family.evaBonus || 0;
          if (family.magBonus) equipBonus.magicPower += family.magBonus * tier.mult * upgradeMult;
          if (family.mpCostReduction) equipBonus.mpCostReduction += family.mpCostReduction;
        }
      } else if (item.type === "armor") {
        const arch = ARMOR_ARCHETYPES[item.archetype];
        const tier = MATERIAL_TIERS[item.material];
        if (arch && tier) {
          const upgradeMult = Math.pow(1.1, item.level || 0);
          const itemPower = 5 * tier.mult * upgradeMult;
          equipBonus.defense += itemPower * arch.defMult;
          equipBonus.maxHp += itemPower * (arch.hpMult || 0);
          equipBonus.maxMp += itemPower * (arch.mpMult || 0);
          equipBonus.magicPower += itemPower * (arch.magMult || 0);
          equipBonus.speed += arch.spdPenalty || 0;
          equipBonus.evasion += arch.evaBonus || arch.evaPenalty || 0;
        }
      }
      if (item.affixes) {
        item.affixes.forEach((aff) => {
          switch (aff) {
            case "vampire":
              equipBonus.vampirism += 0.05;
              break;
            case "sage":
              equipBonus.mpCostReduction += 0.1;
              break;
            case "titan":
              equipBonus.maxHp += this.baseMaxHp * 0.2;
              equipBonus.speed -= 2;
              break;
            case "assassin":
              equipBonus.critChance += 10;
              equipBonus.accuracy += 20;
              break;
            case "phoenix":
              equipBonus.hasPhoenix = true;
              break;
          }
        });
      }
    });
    const hpBoost = (villageUpgrades.hp_boost || 0) * 10;
    const atkBoost = villageUpgrades.attack_boost || 0;
    const defBoost = villageUpgrades.defense_boost || 0;
    let hasteMult = 1;
    if (this.statusEffects.some((e) => e.type === "haste")) hasteMult = 1.5;
    this.maxHp = Math.floor((this.baseMaxHp + hpBoost + equipBonus.maxHp) * traitMults.maxHp);
    this.maxMp = Math.floor((this.baseMaxMp + equipBonus.maxMp) * traitMults.maxMp);
    this.strength = Math.floor((this.baseStrength + atkBoost + equipBonus.strength) * traitMults.strength);
    this.speed = Math.floor((this.baseSpeed + equipBonus.speed) * traitMults.speed * hasteMult);
    this.defense = Math.floor((this.baseDefense + defBoost + equipBonus.defense) * traitMults.defense);
    this.magicPower = Math.floor((this.baseMagicPower + equipBonus.magicPower) * traitMults.magicPower);
    this.evasion = equipBonus.evasion;
    this.mpCostReduction = equipBonus.mpCostReduction;
    this.vampirism = equipBonus.vampirism;
    this.critChanceBonus = equipBonus.critChance;
    this.accuracyBonus = equipBonus.accuracy;
    this.hasPhoenix = equipBonus.hasPhoenix;
    this.hp = Math.min(this.hp, this.maxHp);
    this.mp = Math.min(this.mp, this.maxMp);
  }
  addExperience(amount) {
    this.exp += amount;
    let levelsGained = 0;
    while (true) {
      const nextLevelExp = this.level * 20;
      if (this.exp >= nextLevelExp) {
        this.exp -= nextLevelExp;
        this.levelUp();
        levelsGained++;
      } else {
        break;
      }
    }
    return Result.ok(levelsGained);
  }
  levelUp() {
    this.level++;
    this.statPoints += this.level % 5 === 0 ? 3 : 2;
    this.skillPoints += 1;
    this.baseMaxHp += 5;
    this.baseMaxMp += 2;
    this.recalculateStats();
    this.hp = this.maxHp;
    this.mp = this.maxMp;
  }
  increaseStat(statId) {
    if (this.statPoints <= 0) return Result.fail("error_no_stat_points");
    const statMap = {
      baseMaxHp: 3,
      baseMaxMp: 2,
      baseStrength: 1,
      baseSpeed: 1,
      baseDefense: 1,
      baseMagicPower: 1
    };
    const gain = statMap[statId];
    if (gain === void 0) return Result.fail("error_invalid_stat");
    this[statId] += gain;
    this.statPoints--;
    this.recalculateStats();
    return Result.ok(this[statId]);
  }
  learnSkill(skillId, unlockCost) {
    if (this.skillPoints < unlockCost) return Result.fail("error_no_skill_points");
    if (this.skills[skillId] !== void 0) return Result.fail("error_skill_already_unlocked");
    this.skills[skillId] = 0;
    this.skillPoints -= unlockCost;
    return Result.ok(this.skills[skillId]);
  }
  upgradeSkill(skillId, upgradeCost) {
    if (this.skills[skillId] === void 0) return Result.fail("error_skill_locked");
    if (this.skillPoints < upgradeCost) return Result.fail("error_no_skill_points");
    this.skills[skillId]++;
    this.skillPoints -= upgradeCost;
    return Result.ok(this.skills[skillId]);
  }
  toJSON() {
    return {
      id: this.id,
      name: this.name,
      origin: this.origin,
      level: this.level,
      exp: this.exp,
      statPoints: this.statPoints,
      skillPoints: this.skillPoints,
      baseMaxHp: this.baseMaxHp,
      baseMaxMp: this.baseMaxMp,
      baseStrength: this.baseStrength,
      baseSpeed: this.baseSpeed,
      baseDefense: this.baseDefense,
      baseMagicPower: this.baseMagicPower,
      hp: this.hp,
      mp: this.mp,
      status: this.status,
      skills: JSON.parse(JSON.stringify(this.skills)),
      statusEffects: JSON.parse(JSON.stringify(this.statusEffects)),
      phoenixUsed: this.phoenixUsed,
      equipment: JSON.parse(JSON.stringify(this.equipment))
    };
  }
}
class Persistence {
  constructor(prefix = "rpg_village_v1_") {
    this.prefix = prefix;
  }
  _key(key) {
    return `${this.prefix}${key}`;
  }
  save(key, data) {
    try {
      const serialized = JSON.stringify(data);
      localStorage.setItem(this._key(key), serialized);
      return true;
    } catch (e) {
      console.error(`Engine Persistence: Failed to save ${key}`, e);
      return false;
    }
  }
  load(key, defaultValue = null) {
    try {
      const serialized = localStorage.getItem(this._key(key));
      if (serialized === null) return defaultValue;
      return JSON.parse(serialized);
    } catch (e) {
      console.error(`Engine Persistence: Failed to load ${key}`, e);
      return defaultValue;
    }
  }
  remove(key) {
    localStorage.removeItem(this._key(key));
  }
  clear() {
    Object.keys(localStorage).forEach((key) => {
      if (key.startsWith(this.prefix)) {
        localStorage.removeItem(key);
      }
    });
  }
}
const persistence = new Persistence();
class HeroService {
  constructor(inventoryService) {
    this.STORAGE_KEY = "heroes_data";
    this.inventory = inventoryService;
    this.heroes = this._load();
  }
  _load() {
    const data = persistence.load(this.STORAGE_KEY, []);
    return data.map((h) => {
      const hero = new Hero(h);
      hero.recalculateStats({});
      return hero;
    });
  }
  saveAll() {
    persistence.save(this.STORAGE_KEY, this.heroes.map((h) => h.toJSON()));
  }
  get(id) {
    return this.heroes.find((h) => h.id === id) || null;
  }
  list(status = null) {
    if (status) {
      return this.heroes.filter((h) => h.status === status);
    }
    return [...this.heroes];
  }
  add(heroData) {
    const newHero = new Hero(heroData);
    newHero.recalculateStats({});
    this.heroes.push(newHero);
    this.saveAll();
    return Result.ok(newHero);
  }
  remove(id) {
    const index = this.heroes.findIndex((h) => h.id === id);
    if (index !== -1) {
      const removed = this.heroes.splice(index, 1);
      this.saveAll();
      return Result.ok(removed[0]);
    }
    return Result.fail("error_hero_not_found");

class I18nService {
  constructor() {
    this.translations = { en, es, ca, eu };
    this.currentLang = "en";
  }
  setLanguage(lang) {
    if (this.translations[lang]) {
      this.currentLang = lang;
      return true;
    }
    return false;
  }
  t(key, params = {}) {
    const langData = this.translations[this.currentLang];
    let text = langData[key] || this.translations["en"][key] || key;
    Object.keys(params).forEach((p) => {
      text = text.replace(`{${p}}`, params[p]);
    });
    return text;
  }
}
const i18n = new I18nService();
class GameEngine {
  constructor() {
    this.STORAGE_KEY = "village_state";
    this.inventoryService = new InventoryService();
    this.heroService = new HeroService(this.inventoryService);
    this.battleService = new BattleService(this.inventoryService);
    this.i18n = i18n;
    this.state = this._loadState();
  }
  _loadState() {
    const defaultState = {
      gold: 100,
      food: 50,
      wood: 0,
      stone: 0,
      iron: 0,
      population: 0,
      infrastructure: {
        housing: 1,
        farm: 1,
        blacksmith: 0,
        training_grounds: 0
      },
      lang: "en",
      day: 1,
      lastUpdate: Date.now()
    };
    const loaded = persistence.load(this.STORAGE_KEY, defaultState);
    this.i18n.setLanguage(loaded.lang);
    return loaded;
  }
  _saveState() {
    persistence.save(this.STORAGE_KEY, this.state);
  }
  update() {
    const now = Date.now();
    (now - this.state.lastUpdate) / 1e3;
    this.state.lastUpdate = now;
    this._saveState();
    return {
      village: this.state,
      heroes: this.heroService.list()
    };
  }
  // --- Hero Facade ---
  addHero(heroData) {
    return this.heroService.add(heroData);
  }
  getHeroes() {
    return this.heroService.list();
  }
  // --- Combat Facade ---
  startBattle(enemies) {
    const activeHeroes = this.heroService.list("active");
    return this.battleService.startBattle(activeHeroes, enemies);
  }
  setLanguage(lang) {
    if (this.i18n.setLanguage(lang)) {
      this.state.lang = lang;
      this._saveState();
      return true;
    }
    return false;
  }
}
class EngineAdapter {
  constructor(engine, ui) {
    this.engine = engine;
    this.ui = ui;
    this.rafId = null;
  }
  init() {
    this.ui.onInitialize(() => {
      console.log("Village initialization requested via Adapter");
      this.engine.addVillager();
    });
    this.startLoop();
  }
  startLoop() {
    const loop = () => {
      const newState = this.engine.update();
      this.ui.updateStats(newState);
      this.rafId = requestAnimationFrame(loop);
    };
    this.rafId = requestAnimationFrame(loop);
  }
  stopLoop() {
    if (this.rafId) {
      cancelAnimationFrame(this.rafId);
    }
  }
}
document.addEventListener("DOMContentLoaded", () => {
  console.log("RPG Village Initializing...");
  const engine = new GameEngine();
  const ui = new UIController();
  const adapter = new EngineAdapter(engine, ui);
  adapter.init();
  console.log("RPG Village Ready!");
});</script>
