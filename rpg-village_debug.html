class Persistence {
  constructor(prefix = "rpg_village_v1_") {
    this.prefix = prefix;
  }
  _key(key) {
    return `${this.prefix}${key}`;
  }
  save(key, data) {
    try {
      const serialized = JSON.stringify(data);
      localStorage.setItem(this._key(key), serialized);
      return true;
    } catch (e) {
      console.error(`Engine Persistence: Failed to save ${key}`, e);
      return false;
    }
  }
  load(key, defaultValue = null) {
    try {
      const fullKey = this._key(key);
      const serialized = localStorage.getItem(fullKey);
      console.log(`Persistence: Loading ${fullKey}`, serialized ? "FOUND" : "NOT FOUND");
      if (serialized === null) return defaultValue;
      return JSON.parse(serialized);
    } catch (e) {
      console.error(`Engine Persistence: Failed to load ${key}`, e);
      return defaultValue;
    }
  }
  remove(key) {
    localStorage.removeItem(this._key(key));
  }
  clear() {
    console.warn(`Persistence: CLEARING ALL DATA with prefix ${this.prefix}`);
    Object.keys(localStorage).forEach((key) => {
      if (key.startsWith(this.prefix)) {
        console.log(`Persistence: Removing ${key}`);
        localStorage.removeItem(key);
      }
    });
  }
}
const persistence = new Persistence();
class HeroService {
  constructor(inventoryService) {
    this.STORAGE_KEY = "heroes_data";
    this.inventory = inventoryService;
    this.heroes = this._load();
  }
  _load() {
    const data = persistence.load(this.STORAGE_KEY, []);
    return data.map((h) => {
      const hero = new Hero(h);
      hero.recalculateStats({});
      return hero;
    });
  }
  saveAll() {
    persistence.save(this.STORAGE_KEY, this.heroes.map((h) => h.toJSON()));
  }
  get(id) {
    return this.heroes.find((h) => h.id === id) || null;
  }
  list(status = null) {
    if (status) {
      return this.heroes.filter((h) => h.status === status);
    }
    return [...this.heroes];
  }
  add(heroData) {
    const newHero = new Hero(heroData);
    newHero.recalculateStats({});
    this.heroes.push(newHero);
    this.saveAll();
    return Result.ok(newHero);
  }
  remove(id) {
    const index = this.heroes.findIndex((h) => h.id === id);
    if (index !== -1) {
      const removed = this.heroes.splice(index, 1);
      this.saveAll();
      return Result.ok(removed[0]);
    }
    return Result.fail("error_hero_not_found");
  }
  setStatus(id, status) {
    const hero = this.get(id);
    if (!hero) return Result.fail("error_hero_not_found");
    hero.status = status;
    this.saveAll();
    return Result.ok(hero);
  }
  increaseHeroStat(heroId, statId) {
    const hero = this.get(heroId);
    if (!hero) return Result.fail("error_hero_not_found");
    const result = hero.increaseStat(statId);
    if (result.success) {
      hero.recalculateStats({});
      this.saveAll();
    }
    return result;
  }
  learnHeroSkill(heroId, skillId, unlockCost) {
    const hero = this.get(heroId);
    if (!hero) return Result.fail("error_hero_not_found");
    const result = hero.learnSkill(skillId, unlockCost);
    if (result.success) this.saveAll();
    return result;
  }
  upgradeHeroSkill(heroId, skillId, upgradeCost) {
    const hero = this.get(heroId);
    if (!hero) return Result.fail("error_hero_not_found");
    const result = hero.upgradeSkill(skillId, upgradeCost);
    if (result.success) this.saveAll();
    return result;
  }
  // --- Equipment ---
  equipItem(heroId, slot, equipmentId) {
    const hero = this.get(heroId);
    if (!hero) return Result.fail("error_hero_not_found");
    if (!this.inventory) return Result.fail("error_inventory_not_linked");
    const item = this.inventory.getEquipment(equipmentId);
    if (!item) return Result.fail("error_item_not_found");
    if (item.type === "weapon") {
      if (slot !== "leftHand" && slot !== "rightHand") return Result.fail("error_invalid_slot");
    } else if (item.type === "armor") {
      if (slot !== item.slot) return Result.fail("error_invalid_slot");
    } else {
      return Result.fail("error_invalid_item_type");
    }
    if (hero.equipment[slot]) {
      this.unequipItem(heroId, slot);
    }
    hero.equipment[slot] = item.toJSON();
    this.inventory.removeEquipment(equipmentId);
    hero.recalculateStats({});
    this.saveAll();
    return Result.ok(hero);
  }
  unequipItem(heroId, slot) {
    const hero = this.get(heroId);
    if (!hero) return Result.fail("error_hero_not_found");
    if (!this.inventory) return Result.fail("error_inventory_not_linked");
    const itemData = hero.equipment[slot];
    if (!itemData) return Result.fail("error_slot_empty");
    hero.equipment[slot] = null;
    this.inventory.addEquipment(itemData);
    hero.recalculateStats({});
    this.saveAll();

}

  static calculateDamageMultiplier(attackValue, defenseValue) {

      wind: "storm",
      storm: "water",
      water: "fire"

    if (relationships[targetElement] === skillElement) return 0.5;

    let baseStatValue = this.getFinalStat(attacker, skillData.stat);
    if (skillData.stat === "magicPower" && partyTraits.magicPowerBoost) {

class I18nService {
  constructor() {
    this.translations = { en, es, ca, eu, gl };
    this.currentLang = persistence.load("settings_lang", "en");
  }
  setLanguage(lang) {
    if (this.translations[lang]) {
      this.currentLang = lang;
      persistence.save("settings_lang", lang);
      return true;
    }
    return false;
  }
  t(key, params = {}) {
    const langData = this.translations[this.currentLang];
    let text = langData[key] || this.translations["en"][key] || key;
    Object.keys(params).forEach((p) => {
      text = text.replace(`{${p}}`, params[p]);
    });
    return text;
  }
}

.list-item-title { font-weight: 700; color: var(--text-primary); }
.list-item-level {
    font-size: 0.75rem;
    background: var(--accent-color);
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 800;
}

.resource-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px;
}

.resource-item {
    background: rgba(255,255,255,0.02);
    padding: 15px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--glass-border);
    text-align: center;
}

.resource-item .label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; }
.resource-item .value { display: block; font-size: 1.3rem; font-weight: 800; color: var(--accent-color); }

.action-bar { margin-top: var(--spacing-lg); display: flex; justify-content: center; }
.dashboard-grid { display: grid; grid-template-columns: 1fr; gap: var(--spacing-md); }

@media (min-width: 768px) {
    .dashboard-grid { grid-template-columns: 350px 1fr; }
    .canvas-widget { grid-column: 2; grid-row: 1 / 3; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.domain-view {
    animation: fadeIn 0.4s ease-out;
    padding: var(--spacing-md);
    min-height: 100%;
}

/* Settings Specific */
.btn-danger {
    background: linear-gradient(135deg, var(--danger) 0%, #b91c1c 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
}

.danger-zone {
    border-color: var(--danger) !important;
    background: rgba(239, 68, 68, 0.05) !important;
}

.settings-group {
    margin-bottom: var(--spacing-lg);
}

.settings-label {
    display: block;
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-bottom: var(--spacing-xs);
}

.select-control {
    width: 100%;
    padding: 12px;
    background: var(--bg-accent);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 1rem;
    outline: none;
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 16px;
}

.select-control:focus {
    border-color: var(--accent-color);
}

/* Modal & Intro */
.modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    backdrop-filter: blur(8px);
    animation: fadeIn 0.5s ease;
}

.intro-modal {
    max-width: 500px;
    width: 90%;
    background: var(--bg-secondary);
    padding: var(--spacing-xl);
    border-radius: var(--radius-lg);
    border: 1px solid var(--glass-border);
    text-align: center;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
}

.intro-modal h2 {
    font-family: 'Outfit', sans-serif;
    font-size: 2rem;
    margin-bottom: var(--spacing-md);
    background: linear-gradient(135deg, #fff 0%, var(--accent-color) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.intro-modal p {
    color: var(--text-secondary);
    font-size: 1.1rem;
    line-height: 1.8;
    margin-bottom: var(--spacing-xl);
}

/* Generic Modal */
.modal-body {
    background: var(--bg-secondary);
    max-width: 450px;
    width: 90%;
    padding: var(--spacing-xl);
    border-radius: var(--radius-lg);
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.4s cubic-bezier(0.23, 1, 0.32, 1);
}

.modal-header h3 {
    margin-bottom: var(--spacing-md);
    color: var(--text-primary);
    font-size: 1.5rem;
}

.modal-text {
    color: var(--text-secondary);
    margin-bottom: var(--spacing-xl);
    line-height: 1.6;
}

.modal-actions {
    display: flex;
    gap: var(--spacing-md);
    justify-content: flex-end;
}

.modal-actions .btn {
    min-width: 100px;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(50px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ========================================
   In-Game Toast Notifications
   ======================================== */
.game-toast-container {
    position: fixed;
    top: 80px;
    right: var(--spacing-lg);
    z-index: 9998;
    display: flex;
    flex-direction: column;
    gap: var(--spacing-sm);
    pointer-events: none;
}

.game-toast {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
    padding: var(--spacing-md) var(--spacing-lg);
    border-radius: var(--radius-md);
    border: 1px solid transparent;
    background: var(--bg-secondary);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
    color: var(--text-primary);
    font-size: 0.9rem;
    font-weight: 500;
    max-width: 340px;
    backdrop-filter: blur(12px);
    pointer-events: auto;
    animation: toastIn 0.35s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    transition: opacity 0.4s ease, transform 0.4s ease;
}

.game-toast.toast-error {
    border-color: rgba(231, 76, 60, 0.5);
    background: linear-gradient(135deg, rgba(231, 76, 60, 0.15), var(--bg-secondary));
}

.game-toast.toast-success {
    border-color: rgba(46, 204, 113, 0.5);
    background: linear-gradient(135deg, rgba(46, 204, 113, 0.12), var(--bg-secondary));
}

.game-toast.toast-info {
    border-color: rgba(52, 152, 219, 0.5);
    background: linear-gradient(135deg, rgba(52, 152, 219, 0.12), var(--bg-secondary));
}

.game-toast .toast-icon {
    font-size: 1.2rem;
    flex-shrink: 0;
}

.game-toast.toast-out {
    opacity: 0;
    transform: translateX(30px);
}

@keyframes toastIn {
    from { opacity: 0; transform: translateX(60px); }
    to   { opacity: 1; transform: translateX(0); }
}

/* Stat Assignment & Allocation UI */
.stat-value-group {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
}

.btn-assign-stat {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid var(--accent-color);
    background: transparent;
    color: var(--accent-color);
    font-weight: 900;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 5px rgba(99, 102, 241, 0.2);
}

.btn-assign-stat:hover {
    background: var(--accent-color);
    color: white;
    box-shadow: 0 0 10px var(--accent-glow);
    transform: scale(1.1);
}

.btn-assign-stat:active {
    transform: scale(0.9);
}

.stat-points-alert {
    background: rgba(16, 185, 129, 0.1);
    border: 1px dashed var(--success);
    color: var(--success);
    padding: var(--spacing-sm);
    border-radius: var(--radius-md);
    margin-bottom: var(--spacing-md);
    font-size: 0.9rem;
    text-align: center;
    animation: pulseGlow 2s infinite ease-in-out;
}

@keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 5px rgba(16, 185, 129, 0.1); }
    50% { box-shadow: 0 0 12px rgba(16, 185, 129, 0.3); }
}

.stat-points-alert.locked {
    background: rgba(245, 158, 11, 0.1);
    border: 1px dashed var(--warning, #f59e0b);
    color: var(--warning, #f59e0b);
    animation: none;
}

/* Dynamic Village Canvas Grid */
.village-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 15px;
    padding: 15px;
    background: linear-gradient(135deg, rgba(30, 41, 59, 0.6) 0%, rgba(15, 23, 42, 0.8) 100%);
    border-radius: 12px;
    border: 1px solid var(--glass-border);
    min-height: 250px;
    align-items: stretch;
}

.village-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.02);
    border: 1px dashed rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    padding: 12px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    text-align: center;
}

.village-tile.active {
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.12) 0%, rgba(168, 85, 247, 0.12) 100%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.1);
}

.village-tile.active:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 25px rgba(99, 102, 241, 0.25);
    border-color: rgba(99, 102, 241, 0.4);
}

.village-tile.locked {
    opacity: 0.45;
    background: rgba(0, 0, 0, 0.25);
}

.village-tile-icon {
    font-size: 2.2rem;
    margin-bottom: 6px;
    filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.4));
    transition: transform 0.3s ease;
}

.village-tile.active:hover .village-tile-icon {
    transform: scale(1.18) rotate(6deg);
}

.village-tile-name {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-primary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
}

.village-tile-level {
    font-size: 0.65rem;
    background: var(--accent-color);
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 800;
}

.village-tile.locked .village-tile-level {
    background: rgba(255, 255, 255, 0.12);
    color: var(--text-muted);
}

@media (max-width: 575px) {
    .village-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(3, 1fr);
    }
}

.hero-checkbox-item.wounded {
    cursor: not-allowed !important;
    border-color: rgba(255, 59, 48, 0.15) !important;
    background: rgba(0, 0, 0, 0.2) !important;
}

/* Master-Detail Layout Styles */
.master-detail-layout {
    display: flex;
    flex-direction: row;
    gap: var(--spacing-md);
    align-items: stretch;
    min-height: 520px;
}

.master-detail-layout .master-pane {
    flex: 0 0 320px;
    display: flex;
    flex-direction: column;
}

.empty-detail {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: var(--text-muted);
}

.detail-icon-bg {
    font-size: 4rem;
    opacity: 0.1;
    margin-bottom: 20px;
}

.pane-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--spacing-md);
}

.pane-header h3 { margin-bottom: 0; }

.view-header { margin-bottom: var(--spacing-lg); }

.master-detail-layout .detail-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: rgba(22, 24, 33, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.05);
    min-height: 350px;
}

@media (max-width: 768px) {
    .master-detail-layout {
        flex-direction: column;
    }
    .master-detail-layout .master-pane {
        flex: auto;
    }
}

/* Building Details Grid & Visual Previews */
.building-detail-grid {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 20px;
    margin-top: 15px;
}

@media (max-width: 575px) {
    .building-detail-grid {
        grid-template-columns: 1fr;
    }
}

.building-preview-card {
    background: linear-gradient(135deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.6) 100%);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
}

.building-preview-icon {
    font-size: 5rem;
    filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.5));
    animation: bounceSlow 3s infinite ease-in-out;
}

@keyframes bounceSlow {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

.building-description {
    color: var(--text-secondary);
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 20px;
}

/* Building Stats Comparison */
.building-stats-comparison {
    background: rgba(0, 0, 0, 0.2);
    padding: 15px 20px;
    border-radius: var(--radius-md);
    border: 1px solid var(--glass-border);
    margin-bottom: 20px;
}

.building-stats-comparison h4 {
    margin-bottom: 8px;
    color: var(--text-secondary);
    text-transform: uppercase;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
}

.building-stat-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
}

.building-stat-label {
    color: var(--text-secondary);
}

.building-stat-values {
    font-weight: 700;
}

.building-stat-next {
    color: var(--success);
    margin-left: 8px;
}

/* Prologue Storybook */
.intro-modal.story-slideshow {
    max-width: 650px;
    padding: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}
.prologue-illustration-container {
    width: 100%;
    height: 320px;
    overflow: hidden;
    position: relative;
    border-bottom: 2px solid var(--accent-color);
}
.prologue-illustration-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.prologue-text-container {
    padding: var(--spacing-lg) var(--spacing-xl);
    text-align: left;
    min-height: 150px;
}
.prologue-text-container h2 {
    font-size: 1.5rem;
    margin-top: 0;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #fff 0%, var(--accent-color) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.prologue-text-container p {
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--text-secondary);
    margin-bottom: 0;
}
.prologue-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px var(--spacing-xl) 20px var(--spacing-xl);
    background: rgba(0,0,0,0.3);
    border-top: 1px solid var(--glass-border);
}
.prologue-dots {
    display: flex;
    gap: 8px;
}
.prologue-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    opacity: 0.5;
    transition: all 0.3s ease;
}
.prologue-dot.active {
    background: var(--accent-color);
    opacity: 1;
    transform: scale(1.2);
}

/* --- Turn-Based Combat Styles --- */
.combat-overlay {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(10, 11, 16, 0.98);
    z-index: 10000;
    display: flex;
    flex-direction: column;
    padding: 20px;
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    overflow: hidden;
}

.combat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--glass-border);
    padding-bottom: 15px;
    margin-bottom: 20px;
}

.combat-header h2 {
    font-family: 'Outfit', sans-serif;
    font-size: 1.6rem;
    background: linear-gradient(135deg, #fff 0%, var(--accent-color) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.combat-header-controls {
    display: flex;
    gap: 10px;
}

.combat-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr minmax(300px, 400px) 1fr;
    gap: 20px;
    max-width: 1300px;
    width: 100%;
    margin: 0 auto 20px auto;
    min-height: 0; /* allows children to overflow scroll */
}

@media (max-width: 900px) {
    .combat-grid {
        grid-template-columns: 1fr;
        grid-template-rows: auto 200px auto;
        overflow-y: auto;
    }
}

.combat-column {
    display: flex;
    flex-direction: column;
    gap: 15px;
    overflow-y: auto;
    padding: 10px; /* Gives room for hover scale effect */
    margin: -10px; /* Offset the padding to align with other grid items */
}

.combat-column-title {
    font-family: 'Outfit', sans-serif;
    font-size: 1.1rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--glass-border);
    padding-bottom: 5px;
    margin-bottom: 5px;
}

.combat-log-column {
    display: flex;
    flex-direction: column;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    padding: 15px;
    min-height: 0;
}

.combat-log-console {
    flex: 1;
    overflow-y: auto;
    font-family: 'Fira Code', monospace;
    font-size: 0.85rem;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 15px;
    padding-right: 5px;
}

.combat-current-turn-banner {
    background: var(--bg-accent);
    border: 1px solid var(--glass-border);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    text-align: center;
    font-weight: 700;
    margin-bottom: 15px;
    animation: pulseBorder 2s infinite ease-in-out;
}

@keyframes pulseBorder {
    0%, 100% { border-color: var(--glass-border); }
    50% { border-color: var(--accent-color); }
}

.combat-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    padding: 15px;
    display: flex;
    align-items: center;
    gap: 15px;
    position: relative;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.combat-card.active {
    border-color: var(--accent-color);
    box-shadow: 0 0 15px var(--accent-glow);
    background: rgba(99, 102, 241, 0.1);
}

.combat-card.targetable {
    border-color: var(--success);
    cursor: pointer;
    box-shadow: 0 0 12px rgba(16, 185, 129, 0.3);
}

.combat-card.targetable:hover {
    transform: scale(1.03);
    background: rgba(16, 185, 129, 0.1);
}

.combat-card.dead {
    opacity: 0.4;
    filter: grayscale(0.8);
}

.combat-card-avatar {
    font-size: 2.2rem;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 50%;
    border: 1px solid var(--glass-border);
}

.combat-card-info {
    flex: 1;
}

.combat-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
}

.combat-card-name {
    font-weight: 700;
    font-size: 1rem;
}

.combat-card-level {
    font-size: 0.75rem;
    background: var(--bg-accent);
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
}

.combat-bar-container {
    height: 6px;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
}

.combat-bar {
    height: 100%;
    transition: width 0.3s ease;
}

.combat-bar-hp {
    background: linear-gradient(90deg, var(--danger), #ff6b6b);
}

.combat-bar-mp {
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
}

.combat-bar-text {
    font-size: 0.75rem;
    color: var(--text-secondary);
    display: flex;
    justify-content: space-between;
    margin-top: 1px;
}

.combat-card-statuses {
    display: flex;
    gap: 4px;
    margin-top: 6px;
}

.combat-status-badge {
    font-size: 0.8rem;
    cursor: help;
}

.combat-card-dead-overlay {
    position: absolute;
    top: 10px; right: 10px;
    font-size: 1.4rem;
}

/* Control Panel */
.combat-control-panel {
    background: var(--bg-secondary);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.combat-control-message {
    text-align: center;
    color: var(--text-secondary);
    font-style: italic;
    font-size: 1rem;
}

.combat-control-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

.combat-control-back {
    width: 100%;
    display: flex;
    justify-content: flex-start;
}

/* Floating Animations */
.combat-effects-container {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
}

.floating-num {
    position: absolute;
    font-family: 'Outfit', sans-serif;
    font-weight: 900;
    font-size: 1.8rem;
    text-shadow: 0 0 4px rgba(0,0,0,0.8), 0 2px 8px rgba(0,0,0,0.9);
    animation: floatUpAndFade 1s forwards cubic-bezier(0.18, 0.89, 0.32, 1.28);
    pointer-events: none;
}

@keyframes floatUpAndFade {
