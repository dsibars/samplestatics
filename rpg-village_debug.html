class Persistence {
  constructor(prefix = "rpg_village_v1_") {
    this.prefix = prefix;
  }
  _key(key) {
    return `${this.prefix}${key}`;
  }
  save(key, data) {
    try {
      const serialized = JSON.stringify(data);
      localStorage.setItem(this._key(key), serialized);
      return true;
    } catch (e) {
      console.error(`Engine Persistence: Failed to save ${key}`, e);
      return false;
    }
  }
  load(key, defaultValue = null) {
    try {
      const fullKey = this._key(key);
      const serialized = localStorage.getItem(fullKey);
      console.log(`Persistence: Loading ${fullKey}`, serialized ? "FOUND" : "NOT FOUND");
      if (serialized === null) return defaultValue;
      return JSON.parse(serialized);
    } catch (e) {
      console.error(`Engine Persistence: Failed to load ${key}`, e);
      return defaultValue;
    }
  }
  remove(key) {
    localStorage.removeItem(this._key(key));
  }
  clear() {
    console.warn(`Persistence: CLEARING ALL DATA with prefix ${this.prefix}`);
    Object.keys(localStorage).forEach((key) => {
      if (key.startsWith(this.prefix)) {
        console.log(`Persistence: Removing ${key}`);
        localStorage.removeItem(key);
      }
    });
  }
}

  }

  }

class CombatCalculator {
  /**
   * Extracts the effective stat from an entity
   */
  static getFinalStat(entity, statName) {
    let baseVal = entity[statName] || 0;
    return Math.max(1, baseVal);
  }
  /**
   * Calculates the damage multiplier based on Attack vs Defense ratio (R)
   */
  static calculateDamageMultiplier(attackValue, defenseValue) {
    if (defenseValue <= 0) defenseValue = 1;
    const R = attackValue / defenseValue;
    if (R >= 10) return R / 10;
    if (R >= 5) return 1;
    if (R >= 4) return 0.9 + (R - 4) * 0.1;
    if (R >= 2) return 0.75 + (R - 2) * 0.075;
    if (R >= 1) return 0.5 + (R - 1) * 0.25;
    return R * 0.5;
  }
  /**
   * Calculates elemental efficiency
   */
  static getElementMultiplier(skillElement, targetElement) {
    if (!skillElement || !targetElement || targetElement === "neutral") return 1;
    if (skillElement === targetElement) return 1;
    const relationships = {
      fire: "wind",
      wind: "storm",
      storm: "water",
      water: "fire"
    };
    if (relationships[skillElement] === targetElement) return 1.5;
    if (relationships[targetElement] === skillElement) return 0.5;
    return 1;
  }
  /**
   * Calculates evasion chance (0-100)
   */
  static calculateEvasionChance(attacker, defender) {
    let sAttacker = this.getFinalStat(attacker, "speed");
    let sDefender = this.getFinalStat(defender, "speed");
    if (attacker.accuracyBonus) {
      sAttacker *= 1 + attacker.accuracyBonus / 100;
    }
    const R = sDefender / sAttacker;
    if (R <= 1) {
      return Math.max(0, (R - 0.5) * 20);
    } else {
      return 10 + R * 10;
    }
  }
  /**
   * Main calculation entry point
   * @returns {Object} { amount, evasionChance, isMiss, elementMult, isCrit }
   */
  static calculate(attacker, defender, skillData, skillLevel = 0, partyTraits = {}) {
    const evasionChance = this.calculateEvasionChance(attacker, defender);
    let critChance = attacker.critChanceBonus || 0;
    const isMiss = Math.random() * 100 < evasionChance;
    const isCrit = !isMiss && Math.random() * 100 < critChance;
    if (isMiss) {
      return { amount: 0, evasionChance, isMiss: true, elementMult: 1, isCrit: false };
    }
    const multiplier = 1 + 5e-3 * (skillData.tier || 1) * skillLevel;
    let baseStatValue = this.getFinalStat(attacker, skillData.stat);
    if (skillData.stat === "magicPower" && partyTraits.magicPowerBoost) {
      baseStatValue *= 1 + partyTraits.magicPowerBoost;
    }
    if (skillData.category === "support") {
      const power = skillData.power || 0.1;
      const finalPercentage = power * multiplier;
      return { amount: finalPercentage, evasionChance: 0, isMiss: false, elementMult: 1, isCrit: false };
    } else {
      const damageMultiplier = skillData.baseMultiplier || 1;
      let rawDamage = baseStatValue * damageMultiplier * multiplier;
      if (isCrit) rawDamage *= 1.5;
      const targetDefense = this.getFinalStat(defender, "defense");
      const defMult = this.calculateDamageMultiplier(rawDamage, targetDefense);
      const elementMult = this.getElementMultiplier(skillData.element, defender.element);
      let finalDamage = Math.max(1, Math.floor(rawDamage * defMult * elementMult));
      if (skillData.category === "physical" && partyTraits.physicalDamageReduction) {

    }

class CombatAI {
  /**
   * Decides the best action for the actor based on the combat context.
   * @param {Object} context { actor: actor, allies: [], enemies: [], type: "smart"|"random" }

        }
        const singleHeal = healSkills.find((s) => s.targetType === "single_ally") || groupHeal;

          const targetIndex2 = allies.indexOf(bestTarget);

            skillId: singleHeal.id,
            targetIndex: singleHeal.targetType === "single_ally" ? targetIndex2 : null
          };
        }

    }
    const attackSkills = availableSkills.map((sId) => SKILLS_DATA[sId]).filter((s) => s.category !== "support").sort((a, b) => (b.baseMultiplier || 0) - (a.baseMultiplier || 0));

    let targetIndex = 0;
    const aliveEnemies = enemies.map((e, idx) => ({ e, idx })).filter((item) => item.e.hp > 0);
    const aoeSkill = attackSkills.find((s) => s.targetType === "all_enemies");
    if (aoeSkill && aliveEnemies.length > 1 && type === "smart") {
      chosenSkill = aoeSkill;
    }
    if (aliveEnemies.length > 0) {
      if (type === "smart") {
        aliveEnemies.sort((a, b) => a.e.hp - b.e.hp);
        targetIndex = aliveEnemies[0].idx;
      } else {
        targetIndex = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)].idx;
      }

      targetIndex: chosenSkill.targetType === "single_enemy" || chosenSkill.targetType === "single_ally" ? targetIndex : null

}
