<div id="view-village" class="view">
    <div class="game-header">
        <button class="back-btn" onclick="window.showMenu()">← <span data-i18n="btn_back">BACK</span></button>
        <div class="game-stats">
            <span>💰 <span id="village-gold-val">0</span></span>
            <span>🔮 <span id="village-cores-val">0</span></span>
        </div>
    </div>

    <div class="village-container" style="flex: 1; padding: 20px; overflow-y: auto;">
        <div style="display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px;">
            <button id="tab-tavern" class="menu-btn primary" onclick="window.switchVillageTab('tavern')" data-i18n="hero_roster">Hero Roster</button>
            <button id="tab-shop" class="menu-btn secondary" onclick="window.switchVillageTab('shop')" data-i18n="shop_title">Shop</button>
            <button id="tab-weapon-shop" class="menu-btn secondary" onclick="window.switchVillageTab('weapon-shop')" data-i18n="weapon_shop_title" style="display: none;">Weapon Shop</button>
            <button id="tab-armor-shop" class="menu-btn secondary" onclick="window.switchVillageTab('armor-shop')" data-i18n="armor_shop_title" style="display: none;">Armor Shop</button>
            <button id="tab-gym" class="menu-btn secondary" onclick="window.switchVillageTab('gym')" data-i18n="gym_title">Gym</button>
            <button id="tab-forge" class="menu-btn secondary" onclick="window.switchVillageTab('forge')" data-i18n="forge_title" style="display: none;">Forge</button>
            <button id="tab-upgrades" class="menu-btn secondary" onclick="window.switchVillageTab('upgrades')" data-i18n="upgrades_title">Upgrades</button>
        </div>

        <div id="village-content-tavern" class="village-tab-content">
            <h2 data-i18n="roster_title">Hero Roster</h2>
            <div id="tavern-hero-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                <!-- Hero cards will be injected here -->
            </div>
        </div>

        <div id="village-content-shop" class="village-tab-content" style="display: none;">
            <h2 data-i18n="shop_title">Item Shop</h2>
            <div id="shop-item-list" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                <!-- Shop items will be injected here -->
            </div>
        </div>

        <div id="village-content-weapon-shop" class="village-tab-content" style="display: none;">
            <h2 data-i18n="weapon_shop_title">Weapon Shop</h2>
            <div id="weapon-shop-item-list" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                <!-- Weapon items will be injected here -->
            </div>
        </div>

        <div id="village-content-armor-shop" class="village-tab-content" style="display: none;">
            <h2 data-i18n="armor_shop_title">Armor Shop</h2>
            <div id="armor-shop-item-list" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                <!-- Armor items will be injected here -->
            </div>
        </div>

        <div id="village-content-gym" class="village-tab-content" style="display: none;">
            <h2 data-i18n="gym_title">Hero Gym</h2>
            <div id="gym-hero-list" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                <!-- Gym hero list here -->
            </div>
        </div>

        <div id="village-content-forge" class="village-tab-content" style="display: none;">
            <h2 data-i18n="forge_title">Mystic Forge</h2>
            <div id="forge-inventory-list" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                <!-- Forge inventory here -->
            </div>
        </div>

        <div id="village-content-upgrades" class="village-tab-content" style="display: none;">
            <h2 data-i18n="upgrades_title">Village Upgrades</h2>
            <div id="upgrades-list" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                <!-- Upgrades will be injected here -->
            </div>
        </div>
    </div>
</div>
