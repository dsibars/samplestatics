<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Idle V2 Preview</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --bg-card: #16161a;
            --primary: #00f2ff;
            --primary-dim: rgba(0, 242, 255, 0.1);
            --secondary: #7000ff;
            --text-main: #e0e0e6;
            --text-dim: #a0a0aa;
            --border: #2d2d35;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        #app-v2 {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .v2-header {
            padding: 15px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .v2-container {
            flex: 1;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* Desktop Layout */
        .desktop-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            grid-template-rows: auto 1fr;
            gap: 20px;
        }

        .desktop-sidebar {
            grid-row: 1 / 3;
        }

        .desktop-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Mobile Layout */
        .mobile-layout {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .card-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-nav {
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: var(--primary);
            color: black;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .stat-label {
            color: var(--text-dim);
        }

        .stat-value {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .btn-v2 {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--primary);
            background: var(--primary-dim);
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-v2:hover:not(:disabled) {
            background: var(--primary);
            color: black;
        }

        .btn-v2:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .exp-bar-container {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .exp-bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        .skill-item {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid transparent;
        }

        .skill-item.unlocked {
            border-left-color: var(--primary);
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .skill-name {
            font-weight: 600;
        }

        .skill-level {
            font-size: 0.8rem;
            color: var(--primary);
        }

        .skill-desc {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.4;
        }

        .equip-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .equip-slot {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed #444;
        }

        .equip-slot.occupied {
            border-style: solid;
            border-color: var(--secondary);
        }

        .slot-name {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .item-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="app-v2">
        <header class="v2-header">
            <div style="font-weight: 700; font-size: 1.2rem; letter-spacing: -0.02em;">
                RPG <span style="color: var(--primary);">IDLE</span> <span style="font-weight: 300; opacity: 0.6;">V2</span>
            </div>
            <div>
                <a href="index.html" class="btn-v2" style="text-decoration: none; font-size: 0.8rem;">BACK TO LEGACY</a>
            </div>
        </header>

        <main id="main-content" class="v2-container">
            <!-- Content will be injected by JS -->
        </main>
    </div>

    <script type="module" src="./js/presentation/index_v2.js"></script>
</body>
</html>
