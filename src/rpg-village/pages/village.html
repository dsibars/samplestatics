<section id="village-view" class="domain-view">
    <div class="dashboard-grid">
        <!-- Left Column: Status & Queue -->
        <div class="side-panel">
            <!-- Village Status Widget -->
            <div class="card widget status-widget">
                <h3 data-i18n="ui_village_status">Village Status</h3>
                <div class="status-content">
                    <div class="status-item-detailed">
                        <div class="status-row">
                            <span class="label" data-i18n="village_gold">Gold</span>
                            <span id="village-gold" class="value">--</span>
                        </div>
                    </div>
                    
                    <div class="status-item-detailed">
                        <div class="status-row">
                            <span class="label" data-i18n="village_population">Population</span>
                            <span id="village-pop" class="value">--</span>
                        </div>
                        <div class="sub-label">
                            <span data-i18n="ui_available">Available</span>: <span id="village-pop-avail" class="accent-text">--</span>
                        </div>
                    </div>

                    <div class="status-item-detailed">
                        <div class="status-row">
                            <span class="label" data-i18n="inv_storage">Storage</span>
                            <span id="village-storage-text" class="value">-- / --</span>
                        </div>
                        <div class="progress-container">
                            <div id="village-storage-bar" class="progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Construction Queue Widget -->
            <div class="card widget construction-widget">
                <h3 data-i18n="ui_construction">Construction</h3>
                <div id="construction-list-container">
                    <div id="construction-list" class="empty-state" data-i18n="ui_no_projects">
                        No active projects.
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Visual Center & Global Actions -->
        <div class="main-panel">
            <div id="daily-report-container"></div>
            
            <div class="card canvas-card">
                <div class="village-visual-placeholder">
                    <div class="visual-placeholder-text" data-i18n="ui_visual_rep">
                        [Village Visual Representation]
                    </div>
                </div>
            </div>

            <!-- Day Cycle Controller (The "Big Button" Area) -->
            <div class="card action-card">
                <div class="day-cycle-info">
                    <span class="day-label" data-i18n="village_day">Day</span>
                    <span id="village-day" class="day-value">--</span>
                </div>
                
                <div class="action-bar-centered">
                    <button id="btn-next-day" class="btn btn-primary btn-lg shine-effect">
                        <span class="icon">☀️</span>
                        <span data-i18n="btn_next_day">Next Day</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>
