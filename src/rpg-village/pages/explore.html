<section id="explore-view" class="domain-view">
    <div class="explore-layout">
        <div class="explore-map">
            <!-- Map visualization placeholder -->
            <div class="map-placeholder">
                <div class="visual-placeholder-text" data-i18n="ui_world_map">World Map</div>
            </div>
        </div>
        <div class="expeditions-panel">
            <h3 data-i18n="ui_active_expeditions">Active Expeditions</h3>
            <div id="active-expeditions" class="expedition-list">
                <div class="empty-state" data-i18n="ui_no_active_expeditions">No active expeditions.</div>
            </div>
            <button id="btn-new-expedition" class="btn-primary" data-i18n="ui_start_expedition">Start Expedition</button>
        </div>
    </div>
</section>
