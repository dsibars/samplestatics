<div id="view-menu" class="view active">
  <div class="menu-container">
    <div class="glass-card" style="position: relative;">
      <div id="menu-cores-display" style="position: absolute; top: -15px; right: 20px; background: rgba(0, 242, 255, 0.2); border: 1px solid var(--primary); padding: 5px 15px; border-radius: 20px; color: var(--primary); font-weight: bold; font-size: 0.9rem; box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);">
        🔮 <span id="menu-cores-val">0</span>
      </div>

         <!-- Populated via JS -->
      </div>
      
      <div class="menu-actions" id="main-menu-actions">
        <button class="menu-btn primary" onclick="showStageSelect()">
          <span class="icon">▶</span> <span data-i18n="menu_start">SELECT STAGE</span>
        </button>
        <button class="menu-btn secondary" style="border-color: var(--primary);" onclick="showLaboratory()">
          <span class="icon">🧪</span> <span data-i18n="menu_lab">LABORATORY</span>
        </button>
        <button class="menu-btn secondary" onclick="showSettings()">
          <span class="icon">⚙</span> <span data-i18n="menu_settings">SETTINGS</span>
        </button>
        <button class="menu-btn secondary" onclick="location.href='hub.html'" style="margin-top: 10px; border-style: dashed; opacity: 0.8;">
          <span class="icon">🏠</span> <span data-i18n="btn_hub">MAIN HUB</span>
        </button>
      </div>
    </div>
  </div>
</div>
