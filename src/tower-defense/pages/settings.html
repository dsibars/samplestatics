<div id="view-settings" class="view">
  <div class="menu-container">
    <div class="glass-card">
      <h1 class="title" data-i18n="menu_settings">SETTINGS</h1>
      
      <div class="settings-list">
        <div class="setting-item">
          <span data-i18n="lang">Language</span>
          <select id="lang-selector" onchange="changeLanguage()">
            <option value="en">English</option>
            <option value="es">Español</option>
          </select>
        </div>
        <div class="setting-item">
          <span>Game Speed (WIP)</span>
          <select>
            <option>1x</option>
            <option>2x</option>
          </select>
        </div>
        <div class="setting-item">
          <span>Difficulty</span>
          <select>
            <option>Normal</option>
            <option>Hard</option>
          </select>
        </div>
      </div>
      
      <div style="margin-bottom: 20px;">
        <button class="menu-btn" style="width: 100%; border: 1px solid var(--danger); color: var(--danger); background: transparent;" onclick="clearGameData()">CLEAR DATA</button>
      </div>
      
      <button class="menu-btn secondary" onclick="showMenu()" data-i18n="btn_back">BACK</button>
    </div>
  </div>
</div>
