<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Static Apps Hub</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .lang-control {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .lang-control select {
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            padding: 5px 10px;
            border-radius: 6px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .app-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }
        .app-card {
            background: #1e293b;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #334155;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .app-card:hover {
            transform: translateY(-5px);
            border-color: #6366f1;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            background: #273549;
        }
        .app-card h2 {
            margin: 0;
            font-size: 1.5rem;
            color: #38bdf8;
        }
        .app-card p {
            margin: 0;
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.5;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            background: #0ea5e9;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="lang-control">
        <label for="lang-selector" data-i18n="lang">Language</label>
        <select id="lang-selector" onchange="changeLanguage()">
            <option value="es">Español</option>
            <option value="en">English</option>
            <option value="ca">Català</option>
            <option value="eu">Euskara</option>
            <option value="gl">Galego</option>
        </select>
    </div>

    <h1 data-i18n="hub_title">App Hub</h1>
    <div class="app-list">
        <a href="./daily-routine-exercise.html" class="app-card">
            <span class="badge" data-i18n="static_badge">Static App</span>
            <h2 data-i18n="app_workout_title">Daily Routine Tracker</h2>
            <p data-i18n="app_workout_desc">Exercise tracker with history and advanced statistics.</p>
        </a>
        <a href="./money-track.html" class="app-card">
            <span class="badge" data-i18n="static_badge">Static App</span>
            <h2 data-i18n="app_money_title">Balance</h2>
            <p data-i18n="app_money_desc">Track personal expenses and debts with friends.</p>
        </a>
        <a href="./todo-list.html" class="app-card">
            <span class="badge" data-i18n="static_badge">Static App</span>
            <h2 data-i18n="app_todo_title">Todo List</h2>
            <p data-i18n="app_todo_desc">Simple daily task manager for professional focus.</p>
        </a>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
