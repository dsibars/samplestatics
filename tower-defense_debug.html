class Enemy {
  constructor(path, cellSize, stats, presentation, adjustments = {}) {
    this.path = path;
    this.cellSize = cellSize;
    this.stats = {
      hp: stats.hp || 5,
      speed: stats.speed || 2,
      damage: stats.damage || 1,
      reward: stats.reward || 5,
      ...stats

      radiusMult: presentation.radiusMult || 0.3,
      ...presentation

    if (adjustments.damageMult) this.stats.damage *= adjustments.damageMult;

    this.targetY = path[0].y * cellSize + cellSize / 2;

    } else {

      this.speedBoostTimer -= deltaTime;
      currentSpeed *= this.stats.burstSpeedMult || 1;

    const dy = this.targetY - this.y;

    this.paths = paths || [];

    this.activeWaveNumber = 0;
    this.activeSequence = [];

    this.remainingInRound = 0;
    this.timer = 0;
    this.waveIsActive = false;
  }
  startWave(waveNum) {
    if (!this.wavesData[waveNum]) return false;
    this.activeWaveNumber = waveNum;
    this.activeSequence = this.wavesData[waveNum];
    this.currentRoundIndex = 0;
    this.timer = 0;
    this.waveIsActive = true;
    this.remainingInRound = this.activeSequence.length > 0 ? this.activeSequence[0].amount : 0;
    return true;
  }
  update(deltaTime) {
    const spawnedEnemies = [];
    if (!this.waveIsActive || this.currentRoundIndex >= this.activeSequence.length) {
      this.waveIsActive = false;
      return spawnedEnemies;
    }
    const currentRound = this.activeSequence[this.currentRoundIndex];
    this.timer += deltaTime;
    if (this.timer >= currentRound.delayMs) {
      this.timer = 0;
      const targetPath = this.paths[currentRound.pathIndex] || this.paths[0];
      const enemy = new Enemy(
        targetPath,
        this.cellSize,
        currentRound.type.stats,
        currentRound.type.presentation,
        this.adjustments
      );
      spawnedEnemies.push(enemy);
      this.remainingInRound--;
      if (this.remainingInRound <= 0) {
        this.currentRoundIndex++;
        if (this.currentRoundIndex < this.activeSequence.length) {
          this.remainingInRound = this.activeSequence[this.currentRoundIndex].amount;
          this.timer = 0;
        } else {
          this.waveIsActive = false;
        }
      }
    }
    return spawnedEnemies;
  }
  isWaveFinished() {
    return !this.waveIsActive;
  }
  hasMoreWaves() {
    return !!this.wavesData[this.activeWaveNumber + 1];
  }

class Tower {
  constructor(gridX, gridY, cellSize, definition) {

    this.y = gridY * cellSize + cellSize / 2;
    this.definition = definition;
    this.stats = { ...definition.stats };
    this.presentation = { ...definition.presentation };

    this.fireTarget = null;
    this.fireTimer = 0;

  update(deltaTime, enemies) {

        this.isFiring = false;
        this.fireTarget = null;

      this.acquireAndFire(enemies);
    }

        const dy = this.currentTarget.y - this.y;

          if (e.target === this.canvas) {
            this.handleCanvasClick(e);
          }
        }
      }
      pointerDownPos = null;
      isDragging = false;
    });
  }
  resize() {
    const parent = this.canvas.parentElement;
    this.isPortrait = parent.clientHeight > parent.clientWidth;
    let screenShortSide = this.isPortrait ? parent.clientWidth : parent.clientHeight;
    this.cellSize = Math.floor(screenShortSide / this.scenario.gridHeight);
    if (this.isPortrait) {
      this.canvas.width = this.scenario.gridHeight * this.cellSize;
      this.canvas.height = this.scenario.gridWidth * this.cellSize;
      parent.style.overflowX = "hidden";
      parent.style.overflowY = "auto";
    } else {
      this.canvas.width = this.scenario.gridWidth * this.cellSize;
      this.canvas.height = this.scenario.gridHeight * this.cellSize;
      parent.style.overflowY = "hidden";
      parent.style.overflowX = "auto";
    }
  }
  closeTowerPopup() {
    const popup = document.getElementById("tower-popup");
    if (popup) popup.style.display = "none";
  }
  showTowerPopup(gridX, gridY) {
    const popup = document.getElementById("tower-popup");
    const content = document.getElementById("tower-popup-content");
    content.innerHTML = "";
    TOWER_TYPES.forEach((type) => {
      const canAfford = this.money >= type.cost;
      const btn = document.createElement("div");
      btn.className = `tower-option ${canAfford ? "" : "disabled"}`;
      btn.innerHTML = `
                <div class="tower-opt-header">
                    <span>${type.name}</span>
                    <span class="tower-opt-cost">💰 ${type.cost}</span>
                </div>
                <div class="tower-opt-desc">${type.description}</div>
                <div class="tower-opt-stats">
                    <span>${t("stats_damage")} ${type.stats.damage}</span>
                    <span>${t("stats_range")} ${type.stats.range}</span>
                    <span>${t("stats_cooldown")} ${type.stats.cooldownMs}ms</span>
                </div>
            `;
      if (canAfford) {
        btn.onclick = () => {
          this.buyTower(gridX, gridY, type);
        };
      }
      content.appendChild(btn);
    });
    popup.style.display = "flex";
  }
  buyTower(gridX, gridY, type) {
    if (this.money >= type.cost) {
      this.money -= type.cost;
      this.updateStats();
      this.towers.push(new Tower(gridX, gridY, this.cellSize, type));
      this.closeTowerPopup();
    }
  }
  handleCanvasClick(e) {
    if (!this.isRunning) return;
    const rect = this.canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    let logicMouseX = mouseX;
    let logicMouseY = mouseY;
    if (this.isPortrait) {
      logicMouseX = mouseY;
      logicMouseY = mouseX;
    }
    const gridX = Math.floor(logicMouseX / this.cellSize);
    const gridY = Math.floor(logicMouseY / this.cellSize);
    if (gridY >= 0 && gridY < this.scenario.matrix.length && gridX >= 0 && gridX < this.scenario.matrix[0].length) {
      const cellType = this.scenario.matrix[gridY][gridX];
      if (cellType === 0) {
        const existing = this.towers.find((t2) => t2.gridX === gridX && t2.gridY === gridY);
        if (!existing) {
          this.showTowerPopup(gridX, gridY);
        } else {
          this.closeTowerPopup();
        }
      } else {
        this.closeTowerPopup();
      }
    } else {
      this.closeTowerPopup();
    }
  }
  start(stageId) {
    this.isRunning = true;
    this.currentStageId = stageId || 1;
    const stageConfig = STAGES[this.currentStageId] || STAGES[1];
    this.scenario = new Scenario(stageConfig.scenarioId);
    this.resize();
    this.lives = 20;
    this.money = stageConfig.startingMoney || 100;
    this.wave = 1;
    this.enemies = [];
    this.towers = [];
    this.closeTowerPopup();
    const overlay = document.getElementById("next-wave-overlay");
    if (overlay) overlay.style.display = "flex";
    const winOverlay = document.getElementById("win-overlay");
    if (winOverlay) winOverlay.style.display = "none";
    const loseOverlay = document.getElementById("lose-overlay");
    if (loseOverlay) loseOverlay.style.display = "none";
    this.spawner = new EnemySpawner(
      this.scenario.paths,
      this.cellSize,
      stageConfig.waves,
      { difficulty: 1 }
    );
    this.lastTime = performance.now();
    this.loop(this.lastTime);
    this.updateStats();
  }
  startNextWave() {
    if (this.spawner && this.spawner.startWave(this.wave)) {
      const overlay = document.getElementById("next-wave-overlay");
      if (overlay) overlay.style.display = "none";
    }
  }
  stop() {
    this.isRunning = false;
  }
  updateStats() {
    document.getElementById("stat-lives").innerText = `❤️ ${this.lives}`;
    document.getElementById("stat-money").innerText = `💰 ${this.money}`;
    document.getElementById("stat-wave").innerText = `🌊 Wave ${this.wave}`;
  }
  loop(timestamp) {
    if (!this.isRunning) return;
    const deltaTime = timestamp - this.lastTime;
    this.lastTime = timestamp;
    this.update(deltaTime);
    this.draw();
    requestAnimationFrame((t2) => this.loop(t2));
  }
  update(deltaTime) {
    if (this.spawner) {
      const newEnemies = this.spawner.update(deltaTime);
      this.enemies.push(...newEnemies);
    }
    this.towers.forEach((t2) => t2.update(deltaTime, this.enemies));
    for (let i = this.particles.length - 1; i >= 0; i--) {
      this.particles[i].update();
      if (this.particles[i].life <= 0) {
        this.particles.splice(i, 1);
      }
    }
    for (let i = this.enemies.length - 1; i >= 0; i--) {
      const enemy = this.enemies[i];
      enemy.update(deltaTime);
      if (enemy.reachedGoal) {
        this.lives -= enemy.stats.damage || 1;
        this.updateStats();
        this.enemies.splice(i, 1);
        if (this.lives <= 0) {
          this.lives = 0;
          this.updateStats();
          this.gameLose();
          return;
        }
      } else if (enemy.isDead) {
        this.money += enemy.stats.reward;
        this.updateStats();
        for (let j = 0; j < 12; j++) {
          this.particles.push(new Particle(enemy.x, enemy.y, enemy.presentation.color));
        }
        this.enemies.splice(i, 1);
      }
    }
    if (this.spawner && this.spawner.isWaveFinished() && this.enemies.length === 0) {
      const overlay = document.getElementById("next-wave-overlay");
      if (overlay && overlay.style.display === "none") {
        if (this.spawner.hasMoreWaves()) {
          this.wave++;
          this.updateStats();
          overlay.style.display = "flex";
        } else {
          this.gameWin();
        }
      }
    }
  }
  draw() {
    this.ctx.setTransform(1, 0, 0, 1, 0, 0);
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    this.ctx.save();
    if (this.isPortrait) {
      this.ctx.setTransform(0, 1, 1, 0, 0, 0);
    } else {
      this.ctx.setTransform(1, 0, 0, 1, 0, 0);
    }
    const matrix = this.scenario.matrix;
    for (let y = 0; y < matrix.length; y++) {
      for (let x = 0; x < matrix[y].length; x++) {
        const cellType = matrix[y][x];
        const px = x * this.cellSize;
        const py = y * this.cellSize;
        this.ctx.lineWidth = 1;
        this.ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
        this.ctx.strokeRect(px, py, this.cellSize, this.cellSize);
        if (cellType === 1 || cellType === 2 || cellType === 3) {
          this.ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
          this.ctx.fillRect(px + 2, py + 2, this.cellSize - 4, this.cellSize - 4);
          if (cellType === 2) {
            this.ctx.fillStyle = "rgba(0, 255, 136, 0.3)";
            this.ctx.fillRect(px, py, this.cellSize, this.cellSize);
          } else if (cellType === 3) {
            this.ctx.fillStyle = "rgba(255, 0, 85, 0.3)";
            this.ctx.fillRect(px, py, this.cellSize, this.cellSize);
          }
        } else {
          this.ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
          this.ctx.beginPath();
          this.ctx.arc(px + this.cellSize / 2, py + this.cellSize / 2, 2, 0, Math.PI * 2);
          this.ctx.fill();
        }
      }
    }
    this.towers.forEach((t2) => t2.draw(this.ctx));
    this.enemies.forEach((enemy) => enemy.draw(this.ctx));
    this.particles.forEach((p) => p.draw(this.ctx));
    this.ctx.restore();
  }
  gameLose() {
    this.stop();
    const loseOverlay = document.getElementById("lose-overlay");
    if (loseOverlay) {
      loseOverlay.style.display = "flex";
    }
  }
  gameWin() {
    this.stop();
    const maxStageStr = localStorage.getItem("td_max_stage") || "1";
    let maxStage = parseInt(maxStageStr, 10);
    if (this.currentStageId >= maxStage) {
      maxStage = this.currentStageId + 1;
      localStorage.setItem("td_max_stage", maxStage.toString());
    }
    const winOverlay = document.getElementById("win-overlay");
    if (winOverlay) {
      winOverlay.style.display = "flex";
      const nextStageBtn = document.getElementById("btn-next-stage");
      if (STAGES[this.currentStageId + 1]) {
        nextStageBtn.style.display = "flex";
      } else {
        nextStageBtn.style.display = "none";
      }
    }
  }
}
let game = null;

        </div>
        <div class="setting-item">
          <span>Difficulty</span>
          <select>
            <option>Normal</option>
            <option>Hard</option>
          </select>
        </div>
      </div>
      
      <div style="margin-bottom: 20px;">
        <button class="menu-btn" style="width: 100%; border: 1px solid var(--danger); color: var(--danger); background: transparent;" onclick="clearGameData()">CLEAR DATA</button>
      </div>
      
      <button class="menu-btn secondary" onclick="showMenu()" data-i18n="btn_back">BACK</button>
    </div>
  </div>
</div>

</body>
</html>
