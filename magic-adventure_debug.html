class DrawingEngine {
  constructor() {
    this.points = [];
    this.currentDrawId = 0;
    this.isDrawing = false;

      sampleRateMs: 10

    };
    this.lastCaptureTime = 0;
  }
  startNewStroke() {
    this.currentDrawId++;
    this.isDrawing = true;
  }
  stopStroke() {
    this.isDrawing = false;
  }
  addPoint(x, y) {
    if (!this.isDrawing) return;
    const now = Date.now();
    if (now - this.lastCaptureTime < this.config.sampleRateMs) {
      return;

    this.points.push({
      x,
      y,
      timestamp: now,
      drawId: this.currentDrawId
    });
    this.lastCaptureTime = now;
  }
  getRawData() {
    return [...this.points];
  }

    this.isDrawing = false;
    this.lastCaptureTime = 0;

  constructor() {
    super("square");

class PlusDetector extends PatternDetector {
  constructor() {
    super("plus");
  }

    const box = this.getBoundingBox(points);
    const centerX = box.centerX;

    points.forEach((p) => {

      const distToHorizontalAxis = Math.abs(p.y - centerY);

    const finalScore = score * 0.6 + opennessScore * 0.4;

      score: finalScore,
      type: "plus",
      metadata: {
        boundingBox: box

    };

class RecognitionEngine {
  constructor() {

      new SquareDetector(),
      new PlusDetector()

    const results = [];
    strokes.forEach((stroke, index) => {
      let bestMatch = null;
      this.detectors.forEach((detector) => {
        const match = detector.detect(stroke);
        if (match && (!bestMatch || match.score > bestMatch.score)) {
          bestMatch = match;
        }
      });
      if (bestMatch) {
        results.push({
          strokeIndex: index,
          ...bestMatch

        results.push({
          strokeIndex: index,
          type: "unknown",
          score: 0,
          metadata: {
            boundingBox: this.calculateBoundingBox(stroke)

        });
      }
    });
    return results;
  }
  calculateBoundingBox(points) {
    if (points.length === 0) return null;
    let minX = points[0].x, maxX = points[0].x;
    let minY = points[0].y, maxY = points[0].y;
    points.forEach((p) => {
      minX = Math.min(minX, p.x);
      maxX = Math.max(maxX, p.x);
      minY = Math.min(minY, p.y);
      maxY = Math.max(maxY, p.y);

class SpellService {
  constructor(recognitionEngine2) {
    this.recognitionEngine = recognitionEngine2;
    this.mappings = {
      "circle": { element: "Water", baseDamage: 10, baseCost: 10, name: "Water Ball" },
      "square": { element: "Earth", baseDamage: 15, baseCost: 15, name: "Stone Blast" },
      "plus": { effect: "multi-target", nameModifier: "Burst" }
    };
  }
  /**
   * Converts recognized patterns into a Spell object.
   */
  createSpellFromStrokes(strokes) {
    const recognized = this.recognitionEngine.recognize(strokes);
    if (recognized.length === 0) {
      return new Spell({
        name: "Fizzle",
        type: "none",
        element: "None",
        mpCost: 1,
        damage: 0
      });
    }
    let mainPattern = null;
    const effects = [];
    let totalIntensity = 0;
    recognized.forEach((item) => {
      const config = this.mappings[item.type];
      if (config) {
        if (config.element && !mainPattern) {
          mainPattern = { ...item, config };
        } else if (config.effect) {
          effects.push(config.effect);
        }
      }
      if (item.metadata && item.metadata.boundingBox) {
        const size = Math.max(item.metadata.boundingBox.width, item.metadata.boundingBox.height);
        totalIntensity += size / 200;
      }
    });
    if (!mainPattern) {
      return new Spell({
        name: "Basic Spark",
        type: "spark",
        element: "Neutral",
        mpCost: 5,
        damage: Math.round(5 * totalIntensity)
      });
    }
    const baseDamage = mainPattern.config.baseDamage;
    const baseCost = mainPattern.config.baseCost;
    let intensity = Math.min(2, totalIntensity);
    let damage = Math.round(baseDamage * intensity);
    let mpCost = Math.round(baseCost * intensity);
    let name = mainPattern.config.name;
    if (effects.includes("multi-target")) {
      name = `${name} ${this.mappings["plus"].nameModifier}`;
      damage = Math.round(damage * 0.7);
      mpCost = Math.round(mpCost * 1.5);
    }
    return new Spell({
      name,
      type: mainPattern.type,
      element: mainPattern.config.element,
      mpCost: Math.min(100, mpCost),
      damage,
      effects
    });
  }
}
