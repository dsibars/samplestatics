<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { font-family: sans-serif; background: #121212; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: manipulation; overflow: hidden; }
    .step, .view { display: none; text-align: center; width: 100%; animation: fadeIn 0.2s; padding: 20px; box-sizing: border-box; }
    .active { display: block; overflow-y: auto; max-height: 100vh; }
    .counter-container { display: flex; justify-content: center; align-items: center; margin: 20px 0; }
    .val { font-size: 5rem; font-weight: bold; min-width: 120px; color: #4CAF50; }
    .btn-circle { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #4CAF50; background: none; color: white; font-size: 2rem; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .btn-circle:active { background: #4CAF50; }
    .next-btn { width: 90%; padding: 20px; background: #4CAF50; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin: 10px 0; }
    label { color: #888; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 5px; }
    .exercise-name { color: white; font-size: 1.8rem; font-weight: bold; display: block; }
    .stat-row { display: flex; justify-content: space-between; width: 100%; margin: 5px 0; border-bottom: 1px solid #222; padding: 8px 0; }
    .comparison { background: #1e2a1e; color: #81c784; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: left; font-size: 0.9rem; border-left: 4px solid #4CAF50; }
    .comparison.bad { background: #2a1e1e; color: #c78181; border-left-color: #f44336; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <!-- Pantalla de Bienvenida / Check de hoy -->
  <div id="view-welcome" class="view active">
    <h2 id="today-date"></h2>
    <div id="check-msg"></div>
    <button class="next-btn" onclick="startWorkout()">EMPEZAR ENTRENAMIENTO</button>
    <button class="next-btn" style="background:#333" onclick="showExit()">HOY NO, GRACIAS</button>
  </div>

  <!-- Contenedor de Pasos -->
  <div id="stepsContainer"></div>

  <!-- Pantalla de Resultados -->
  <div id="view-summary" class="view">
    <h2>¡OBJETIVO CUMPLIDO! 🥪</h2>
    <div id="comparison-box" class="comparison"></div>
    <div id="statsList"></div>
    <div style="margin-top: 20px;">
      <span id="finalTime" style="font-size: 2.5rem; font-weight: bold; color: #4CAF50;"></span>
    </div>
    <button class="next-btn" onclick="exportData()">EXPORTAR HISTORIAL (JSON)</button>
    <button class="next-btn" style="background:#333" onclick="location.reload()">VOLVER</button>
  </div>

  <!-- Pantalla de Salida -->
  <div id="view-exit" class="view">
    <h1 style="font-size: 4rem;">👋</h1>
    <h2>¡Entendido!</h2>
    <p>Descansa y nos vemos mañana para darlo todo.</p>
    <button class="next-btn" onclick="location.reload()">VOLVER</button>
  </div>

  <script>
    const config = [
      { id: 'sent1', label: 'Calentamiento', name: 'Sentadillas', start: 20, type: 'sent' },
      { id: 'flex1', label: 'Al Fallo', name: 'Flexiones 1', start: 8, type: 'flex' },
      { id: 'sent2', label: 'Recuperación', name: 'Sentadillas', start: 20, type: 'sent' },
      { id: 'domEspalda', label: 'Lenta/Negativa', name: 'Dom. Espalda', start: 2, type: 'dom' },
      { id: 'sent3', label: 'Recuperación', name: 'Sentadillas', start: 20, type: 'sent' },
      { id: 'domBiceps', label: 'Recorrido Total', name: 'Dom. Bíceps', start: 3, type: 'dom' },
      { id: 'sent4', label: 'Recuperación', name: 'Sentadillas', start: 20, type: 'sent' },
      { id: 'flex2', label: 'Al Fallo', name: 'Flexiones 2', start: 6, type: 'flex' }
    ];

    let results = {};
    let startTime;
    const todayKey = new Date().toISOString().split('T')[0];
    const history = JSON.parse(localStorage.getItem('workout_history') || '{}');

    // Init
    document.getElementById('today-date').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
    if (history[todayKey]) {
      document.getElementById('check-msg').innerHTML = `<p style="color:#ffa726">⚠️ Ya has registrado una sesión hoy.<br>Si continúas, se sobrescribirá.</p>`;
    }

    function startWorkout() {
      startTime = Date.now();
      document.getElementById('view-welcome').classList.remove('active');
      renderSteps();
    }

    function showExit() {
      document.getElementById('view-welcome').classList.remove('active');
      document.getElementById('view-exit').classList.add('active');
    }

    function renderSteps() {
      const container = document.getElementById('stepsContainer');
      config.forEach((c, i) => {
        results[c.id] = c.start;
        const div = document.createElement('div');
        div.className = `step ${i === 0 ? 'active' : ''}`;
        div.id = `step-${i}`;
        div.innerHTML = `
          <label>${c.label}</label>
          <span class="exercise-name">${c.name}</span>
          <div class="counter-container">
            <button class="btn-circle" onclick="change('${c.id}', -1)">-</button>
            <div class="val" id="v_${c.id}">${c.start}</div>
            <button class="btn-circle" onclick="change('${c.id}', 1)">+</button>
          </div>
          <button class="next-btn" onclick="nextStep(${i})">SIGUIENTE</button>
        `;
        container.appendChild(div);
      });
    }

    function change(id, delta) {
      results[id] = Math.max(0, results[id] + delta);
      document.getElementById('v_' + id).innerText = results[id];
    }

    function nextStep(i) {
      if (i === config.length - 1) return finish();
      document.getElementById(`step-${i}`).classList.remove('active');
      document.getElementById(`step-${i+1}`).classList.add('active');
    }

    function finish() {
      const durationSec = Math.floor((Date.now() - startTime) / 1000);
      const totalSent = config.filter(c => c.type === 'sent').reduce((acc, c) => acc + results[c.id], 0);
      const totalFlex = config.filter(c => c.type === 'flex').reduce((acc, c) => acc + results[c.id], 0);
      const totalDom = config.filter(c => c.type === 'dom').reduce((acc, c) => acc + results[c.id], 0);

      const currentData = { date: todayKey, duration: durationSec, totalSent, totalFlex, totalDom, ...results };

      // Buscar sesión anterior para comparar
      const keys = Object.keys(history).sort();
      const lastKey = keys.filter(k => k < todayKey).pop();
      const lastSession = lastKey ? history[lastKey] : null;

      showSummary(currentData, lastSession);

      // Upsert
      history[todayKey] = currentData;
      localStorage.setItem('workout_history', JSON.stringify(history));
    }

    function showSummary(cur, prev) {
      document.getElementById('stepsContainer').style.display = 'none';
      document.getElementById('view-summary').classList.add('active');
      document.getElementById('finalTime').innerText = `${Math.floor(cur.duration/60)}m ${cur.duration%60}s`;

      let compHtml = prev ? "<b>VS. SESIÓN ANTERIOR:</b><br>" : "¡Primer registro! Dale caña mañana.";
      if(prev) {
        const dF = cur.totalFlex - prev.totalFlex;
        const dD = cur.totalDom - prev.totalDom;
        const dT = prev.duration - cur.duration;
        compHtml += `• ${dF >= 0 ? '+'+dF : dF} Flexiones<br>`;
        compHtml += `• ${dD >= 0 ? '+'+dD : dD} Dominadas<br>`;
        compHtml += `• ${dT >= 0 ? '🚀 '+dT+'s más rápido' : '🐢 '+Math.abs(dT)+'s más lento'}`;
      }
      document.getElementById('comparison-box').innerHTML = compHtml;

      let listHtml = '';
      config.forEach(c => {
        listHtml += `<div class="stat-row"><span>${c.name}</span><span>${results[c.id]}</span></div>`;
      });
      document.getElementById('statsList').innerHTML = listHtml;
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(history, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      window.open(`mailto:?subject=Historial_Workout&body=Adjunto historial en JSON: ${JSON.stringify(history)}`, '_blank');
    }
  </script>
</body>
</html>
