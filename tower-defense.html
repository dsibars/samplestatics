    <!-- Views -->
    <div id="view-menu" class="view active">
  <div class="menu-container">
    <div class="glass-card">
      <h1 class="title" data-i18n="app_title">TOWER DEFENSE</h1>
      <p class="subtitle">Alpha Experiment v0.1</p>
      
      <div class="menu-actions" id="stage-select-menu" style="display: none;">
         <!-- Populated via JS -->
      </div>
      
      <div class="menu-actions" id="main-menu-actions">
        <button class="menu-btn primary" onclick="showStageSelect()">
          <span class="icon">▶</span> <span data-i18n="menu_start">SELECT STAGE</span>
        </button>
        <button class="menu-btn secondary" onclick="showSettings()">
          <span class="icon">⚙</span> <span data-i18n="menu_settings">SETTINGS</span>
        </button>
        <button class="menu-btn secondary" onclick="location.href='hub.html'" style="margin-top: 10px; border-style: dashed; opacity: 0.8;">
          <span class="icon">🏠</span> <span data-i18n="btn_hub">MAIN HUB</span>
        </button>
      </div>
    </div>
  </div>
</div>

    <div id="view-game" class="view">
  <div class="game-header">
    <button class="back-btn" onclick="showMenu()" data-i18n="btn_back">← BACK</button>
    <div class="game-stats">
      <span id="stat-lives">❤️ 20</span>
      <span id="stat-money">💰 100</span>
      <span id="stat-wave">🌊 Wave 1</span>
    </div>
  </div>
  
  <div class="game-container">
    <canvas id="gameCanvas"></canvas>
  </div>
  
  <div id="next-wave-overlay" style="display: none; position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 50;">
      <button class="menu-btn primary" onclick="startNextWave()" style="padding: 10px 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,255,200,0.5);">Start Wave</button>
  </div>
  
  <div id="tower-popup" class="tower-popup" style="display: none;">
    <div class="tower-popup-close" onclick="closeTowerPopup()">✕</div>
    <div id="tower-popup-content" class="tower-popup-content"></div>
  </div>

  <div id="win-overlay" class="game-overlay" style="display: none;">
    <div class="glass-card">
      <h2 class="title" style="font-size: 2rem;">WAVE DEFEATED!</h2>
      <p class="subtitle" style="margin-bottom: 20px;">The fortress stands strong.</p>
      <div class="menu-actions">
        <button id="btn-next-stage" class="menu-btn primary" onclick="startNextStage()">
          <span class="icon">⏭️</span> NEXT STAGE
        </button>
        <button class="menu-btn secondary" onclick="showMenu()">
          <span class="icon">🏠</span> MAIN MENU
        </button>
      </div>
    </div>
  </div>
  

  <div id="lose-overlay" class="game-overlay" style="display: none;">
    <div class="glass-card" style="border-color: var(--danger);">
      <h2 class="title" style="font-size: 2rem; background: var(--danger); -webkit-background-clip: text;">DEFEATED!</h2>
      <p class="subtitle" style="margin-bottom: 20px;">The fortress has fallen.</p>
      <div class="menu-actions">
        <button class="menu-btn primary" onclick="restartStage()" style="background: var(--danger); color: white;">
          <span class="icon">🔄</span> TRY AGAIN
        </button>
        <button class="menu-btn secondary" onclick="showMenu()">
          <span class="icon">🏠</span> MAIN MENU
        </button>
      </div>
    </div>
  </div>
  
  <div class="game-footer">
    <p data-i18n="tap_to_place">Tap an empty square to place a tower.</p>
  </div>
</div>

    <div id="view-settings" class="view">
  <div class="menu-container">
    <div class="glass-card">
      <h1 class="title" data-i18n="menu_settings">SETTINGS</h1>
      
      <div class="settings-list">
        <div class="setting-item">
          <span data-i18n="lang">Language</span>
          <select id="lang-selector" onchange="changeLanguage()">
            <option value="en">English</option>
            <option value="es">Español</option>
          </select>
        </div>
        <div class="setting-item">
          <span>Game Speed (WIP)</span>
          <select>
            <option>1x</option>
            <option>2x</option>
          </select>
        </div>
        <div class="setting-item">
          <span>Difficulty</span>
          <select>
            <option>Normal</option>
            <option>Hard</option>
          </select>
        </div>
      </div>
      
      <div style="margin-bottom: 20px;">
        <button class="menu-btn" style="width: 100%; border: 1px solid var(--danger); color: var(--danger); background: transparent;" onclick="clearGameData()">CLEAR DATA</button>
      </div>
      
      <button class="menu-btn secondary" onclick="showMenu()" data-i18n="btn_back">BACK</button>
    </div>
  </div>
</div>


    <!-- Scripts -->
</body>
</html>
