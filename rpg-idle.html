kground:transparent;border:1px solid var(--glass-border);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer}.game-stats{display:flex;gap:20px;font-weight:600;font-size:.9rem}.game-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:#000c;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;justify-content:center;align-items:center;padding:20px;z-index:200;animation:fadeIn .5s ease-out}.settings-list{display:flex;flex-direction:column;gap:20px;margin-bottom:40px;text-align:left}.setting-item{display:flex;justify-content:space-between;align-items:center}.setting-item select{background:#ffffff1a;color:#fff;border:1px solid var(--glass-border);padding:5px 10px;border-radius:6px}@keyframes fadeIn{0%{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}#combat-log p{margin-bottom:4px;animation:logEntry .3s ease-out}@keyframes logEntry{0%{opacity:0;transform:translate(-10px)}to{opacity:1;transform:translate(0)}}</style>
</head>
<body>

    <!-- Views -->
    <div id="view-menu" class="view active">
    <div class="menu-container">
        <div class="glass-card">
            <h1 class="title">RPG IDLE</h1>
            <p class="subtitle" data-i18n="subtitle">Adventure & Recruit</p>

            <div id="menu-cores-container" style="margin-bottom: 20px; font-weight: 600; color: var(--primary);">
                🔮 <span id="menu-cores-val">0</span> CORES
            </div>

            <div class="menu-actions" id="main-menu-actions">
                <button class="menu-btn primary" onclick="window.startAdventure()">
                    <span class="icon">⚔️</span> <span data-i18n="btn_adventure">ADVENTURE</span>
                </button>
                <button class="menu-btn secondary" onclick="window.showVillage()">
                    <span class="icon">🏘️</span> <span data-i18n="btn_village">VILLAGE</span>
                </button>
                <button class="menu-btn secondary" onclick="window.showSettings()">
                    <span class="icon">⚙️</span> <span data-i18n="btn_settings">SETTINGS</span>
                </button>
                <button class="menu-btn secondary" onclick="window.location.href='../index.html'" style="margin-top: 10px;">
                    <span class="icon">🏠</span> <span data-i18n="btn_hub">MAIN HUB</span>
                </button>
            </div>
        </div>
    </div>
</div>

    <div id="view-village" class="view">
    <div class="game-header">
        <button class="back-btn" onclick="window.showMenu()">← <span data-i18n="btn_back">BACK</span></button>
        <div class="game-stats">
            <span>💰 <span id="village-gold-val">0</span></span>
            <span>🔮 <span id="village-cores-val">0</span></span>
        </div>
    </div>

    <div class="village-container" style="flex: 1; padding: 20px; overflow-y: auto;">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button id="tab-tavern" class="menu-btn primary" onclick="window.switchVillageTab('tavern')" data-i18n="hero_roster">Hero Roster</button>
            <button id="tab-shop" class="menu-btn secondary" onclick="window.switchVillageTab('shop')" data-i18n="shop_title">Shop</button>
            <button id="tab-upgrades" class="menu-btn secondary" onclick="window.switchVillageTab('upgrades')" data-i18n="upgrades_title">Upgrades</button>
        </div>

        <div id="village-content-tavern" class="village-tab-content">
            <h2 data-i18n="roster_title">Hero Roster</h2>
            <div id="tavern-hero-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                <!-- Hero cards will be injected here -->
            </div>
        </div>

        <div id="village-content-shop" class="village-tab-content" style="display: none;">
            <h2 data-i18n="shop_title">Item Shop</h2>
            <div id="shop-item-list" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                <!-- Shop items will be injected here -->
            </div>
        </div>

        <div id="village-content-upgrades" class="village-tab-content" style="display: none;">
            <h2 data-i18n="upgrades_title">Village Upgrades</h2>
            <div id="upgrades-list" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                <!-- Upgrades will be injected here -->
            </div>
        </div>
    </div>
</div>

    <div id="view-game" class="view">
    <div class="game-header">
        <button class="back-btn" onclick="window.showMenu()">← <span data-i18n="btn_quit">QUIT</span></button>
        <div class="game-stats" style="display: flex; gap: 15px; align-items: center;">
            <label style="font-size: 0.8rem; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" id="autobattle-toggle" onchange="window.toggleAutoBattle(this.checked)"> <span data-i18n="autobattle">Auto-Battle</span>
            </label>
            <span id="combat-milestone">Milestone: 0</span>
        </div>
    </div>

    <div class="combat-container" style="flex: 1; display: flex; flex-direction: column; background: #111; position: relative; overflow: hidden;">
        <!-- Canvas area (~50% equivalent) -->
        <div style="flex: 0 0 50%; min-height: 200px; position: relative;">
            <canvas id="combatCanvas" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0;"></canvas>
            
            <!-- Combat Log Overlay -->
            <div id="combat-log" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); font-size: 1.1rem; padding: 15px; overflow-y: auto; color: #fff; z-index: 10; box-sizing: border-box;">
            </div>
        </div>

        <!-- Log Toggle Bar (~10%) -->
        <div id="log-toggle-bar" style="flex: 0 0 10%; background: #222; border-top: 1px solid #444; border-bottom: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; cursor: pointer;" onclick="window.toggleCombatLog()">
            <span style="font-weight: bold; font-size: 1.2rem; color: #ccc;" id="log-toggle-text" data-i18n="show_logs">Show Logs</span>
        </div>

        <!-- Action Panel (~30%) -->
        <div id="action-panel" style="flex: 1; min-height: 0; background: #1a1a1a; padding: 10px; padding-bottom: 60px; display: none; flex-direction: column; gap: 5px; overflow-y: auto;">
        </div>
    </div>

    <!-- Overlays -->
    <div id="win-overlay" class="game-overlay" style="display: none; flex-direction: column; gap: 20px;">
        <h2 style="color: var(--success); font-size: 2.5rem;" data-i18n="victory">VICTORY!</h2>
        <div id="victory-rewards" style="text-align: center; color: #fff;">
        </div>
        <button class="menu-btn primary" onclick="window.nextCombat()" data-i18n="btn_continue">CONTINUE</button>
    </div>

    <div id="lose-overlay" class="game-overlay" style="display: none; flex-direction: column; gap: 20px;">
        <h2 style="color: var(--danger); font-size: 2.5rem;" data-i18n="defeat">DEFEAT</h2>
        <p data-i18n="heroes_defeated">Your heroes were defeated.</p>
        <div id="defeat-rewards" style="text-align: center; color: #fff;">
        </div>
        <button class="menu-btn primary" onclick="window.showMenu()" data-i18n="btn_return_menu">RETURN TO MENU</button>
    </div>
</div>

    <div id="view-hero-details" class="view">
    <div class="game-header">
        <button class="back-btn" onclick="window.showVillage()" style="padding: 8px 12px;">← <span data-i18n="btn_back">BACK</span></button>
        <h2 id="hero-details-name" style="margin: 0; flex: 1; text-align: center;">Hero Name</h2>
        <div style="font-size: 0.9rem; color: #ccc;"><span id="label-sp" data-i18n="stat_points">Stat Points</span> <span id="hero-details-sp">0</span></div>
    </div>
    <div style="flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto;">
        <!-- EXP Bar -->
        <div style="margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px; color: #aaa;">
                <span data-i18n="level_label">Level</span>
                <span id="hero-details-exp-text">0 / 20 EXP</span>
            </div>
            <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
                <div id="hero-details-exp-bar" style="width: 0%; height: 100%; background: linear-gradient(to right, #7000ff, #00f2ff); transition: width 0.3s ease;"></div>
            </div>
        </div>
        
        <!-- Top 70% content -->
        <div style="flex: 7; display: flex; flex-direction: column; gap: 10px;">
            <div id="hero-stats-container" style="display: flex; flex-direction: column; gap: 10px;">
                <!-- Stats injected here -->
            </div>
        </div>
        <!-- Bottom 30% content -->
        <div style="flex: 3; display: flex; flex-direction: column; gap: 10px; justify-content: flex-end; padding-top: 20px; border-top: 1px solid #444;">
            <button class="menu-btn primary" id="btn-hero-skills" onclick="window.showHeroSkills(window.currentHeroIndex)" data-i18n="hero_skills">Skills</button>
        </div>
    </div>
</div>

    <div id="view-hero-skills" class="view">
    <div class="game-header">
        <button class="back-btn" onclick="window.showHeroDetails(window.currentHeroIndex)" style="padding: 8px 12px;">← <span data-i18n="btn_back">BACK</span></button>
        <h2 style="margin: 0; flex: 1; text-align: center;" data-i18n="hero_skills">Skills List</h2>
        <div style="font-size: 0.9rem; color: #ccc;"><span id="label-skills-sp" data-i18n="skill_points">Skill Points</span> <span id="hero-skills-sp">0</span></div>
    </div>
    
    <div style="display: flex; gap: 5px; padding: 10px; background: rgba(0,0,0,0.2); overflow-x: auto; white-space: nowrap;">
        <button id="skill-tab-physical" class="menu-btn primary" style="font-size: 0.8rem; padding: 5px 10px;" onclick="window.switchSkillTab('physical')" data-i18n="physical">Physical</button>
        <button id="skill-tab-magic" class="menu-btn secondary" style="font-size: 0.8rem; padding: 5px 10px;" onclick="window.switchSkillTab('magic')" data-i18n="magic">Magic</button>
        <button id="skill-tab-tricker" class="menu-btn secondary" style="font-size: 0.8rem; padding: 5px 10px;" onclick="window.switchSkillTab('tricker')" data-i18n="tricker">Tricker</button>
        <button id="skill-tab-support" class="menu-btn secondary" style="font-size: 0.8rem; padding: 5px 10px;" onclick="window.switchSkillTab('support')" data-i18n="support">Support</button>
    </div>
    <div style="flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto;">
        <div id="hero-skills-container" style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
            <!-- Skills injected here -->
        </div>
        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #444;">
        </div>
    </div>
</div>

    <div id="view-settings" class="view">
    <div class="menu-container">
        <div class="glass-card">
            <h2 class="title" data-i18n="settings_title">SETTINGS</h2>

            <div class="settings-list">
                <div class="setting-item">
                    <label data-i18n="lang">Language</label>
                    <select id="lang-selector" onchange="window.changeLanguage()">
                        <option value="es">Español</option>
                        <option value="en">English</option>
                        <option value="ca">Català</option>
                        <option value="eu">Euskara</option>
                        <option value="gl">Galego</option>
                    </select>
                </div>
            </div>

            <div class="menu-actions">
                <button class="menu-btn secondary" onclick="window.exportData()" style="margin-bottom: 10px;">
                    <span data-i18n="btn_export">EXPORT JSON</span>
                </button>
                <button class="menu-btn secondary" onclick="document.getElementById('import-input').click()" style="margin-bottom: 20px;">
                    <span data-i18n="btn_import">IMPORT JSON</span>
                </button>
                <input type="file" id="import-input" style="display:none" onchange="window.importData(event)">

                <button class="menu-btn secondary" onclick="window.clearGameData()" style="color: var(--danger); border-color: var(--danger); margin-bottom: 20px;">
                    WIPE DATA
                </button>
                <button class="menu-btn primary" onclick="window.showMenu()">
                    <span data-i18n="btn_back">BACK</span>
                </button>
            </div>
        </div>
    </div>
</div>


    <!-- Scripts -->
</body>
</html>
