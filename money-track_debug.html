let currentLang = localStorage.getItem(SHARED_KEY) || "es";

function applyTranslations() {

window.showView = (viewId) => {
  document.querySelectorAll(".view").forEach((v) => v.classList.remove("active"));
  document.getElementById(`view-${viewId}`).classList.add("active");
  state.currentView = viewId;
  renderView(viewId);
};
function renderView(viewId) {
  applyTranslations();
  if (viewId === "welcome") renderDashboard();

  if (viewId === "history") renderHistory();
  if (viewId === "people") renderPeople();

function renderDashboard() {
  const totals = calculateTotals();
  document.getElementById("main-balance").innerText = formatCurrency(totals.net);
  document.getElementById("main-balance").className = totals.net >= 0 ? "positive" : "negative";
  document.getElementById("total-plus").innerText = formatCurrency(totals.plus);
  document.getElementById("total-minus").innerText = formatCurrency(totals.minus);
}
function calculateTotals() {
  let plus = 0, minus = 0;
  state.transactions.forEach((tx) => {
    if (tx.type === "owe_me") plus += tx.amount;
    else minus += tx.amount;
  });
  return { plus, minus, net: plus - minus };
}
function renderTransactionForm() {
  const select = document.getElementById("tx-person");
  select.innerHTML = state.people.map((p) => `<option value="${p}">${p}</option>`).join("");
  document.querySelectorAll("#tx-type-toggle .toggle-btn").forEach((btn) => {
    btn.onclick = () => {
      document.querySelectorAll("#tx-type-toggle .toggle-btn").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
    };
  });
}

  const desc = document.getElementById("tx-desc").value;
  const type = document.querySelector("#tx-type-toggle .toggle-btn.active").dataset.type;

  <style rel="stylesheet" crossorigin>:root {
  --bg-color: #0f172a;
  --card-bg: #1e293b;
  --text-main: #f8fafc;
  --text-dim: #94a3b8;
  --accent: #38bdf8;
  --income: #4ade80;
  --expense: #f87171;
  --border: #334155;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background-color: var(--bg-color);
  color: var(--text-main);
  margin: 0;
  padding: 0;
  overscroll-behavior: none;
}

.view {
  display: none;
  padding: 20px;
  min-height: 100vh;
  box-sizing: border-box;
}

.view.active {
  display: block;
}

h1, h2 {
  margin-top: 0;
}

.card {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 20px;
  border: 1px solid var(--border);
  margin-bottom: 20px;
}

.balance-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-top: 10px;
}

.balance-item {
  display: flex;
  flex-direction: column;
}

.balance-item .label {
  font-size: 0.8rem;
  color: var(--text-dim);
}

.balance-item .value {
  font-size: 1.5rem;
  font-weight: bold;
}

.positive { color: var(--income); }
.negative { color: var(--expense); }

.btn {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 12px;
  transition: opacity 0.2s;
}

.btn:active {
  opacity: 0.8;
}

.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--border); color: var(--text-main); }
.btn-danger { background: var(--expense); color: #fff; }

.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  font-size: 0.9rem;
  margin-bottom: 8px;
  color: var(--accent);
}

input, select, textarea {
  width: 100%;
  padding: 14px;
  background: #00000033;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: white;
  font-size: 1.1rem;
  box-sizing: border-box;
}

.tx-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 0;
  border-bottom: 1px solid var(--border);
}

.tx-info h3 { margin: 0; font-size: 1rem; }
.tx-info span { font-size: 0.8rem; color: var(--text-dim); }

.tx-amount { font-weight: bold; font-size: 1.1rem; }

.toggle-group {
  display: flex;
  background: var(--border);
  padding: 4px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.toggle-btn {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.2s;
}

.toggle-btn.active {
  background: var(--accent);
  color: white;
}</style>
</head>
