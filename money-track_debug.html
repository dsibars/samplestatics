.tx-info h3 { margin: 0; font-size: 1rem; }
.tx-info span { font-size: 0.8rem; color: var(--text-dim); }

.tx-amount { font-weight: bold; font-size: 1.1rem; }

.toggle-group {
  display: flex;
  background: var(--border);
  padding: 4px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.toggle-btn {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.2s;
}

.toggle-btn.active {
  background: var(--accent);
  color: white;
}</style>
</head>
<body>
  <!-- Views -->
  <div id="view-welcome" class="view active">
  <div class="card" style="text-align: center; background: linear-gradient(135deg, #1e293b, #0f172a);">
    <h2 data-i18n="dashboard">Dashboard</h2>
    <div style="font-size: 2.5rem; font-weight: bold; margin: 10px 0;" id="main-balance">$0.00</div>
    <div class="balance-grid">
      <div class="balance-item">
        <span class="label" data-i18n="total_owe_me">Owes me</span>
        <span class="value positive" id="total-plus">$0.00</span>
      </div>
      <div class="balance-item">
        <span class="label" data-i18n="total_i_owe">I owe</span>
        <span class="value negative" id="total-minus">$0.00</span>
      </div>
    </div>
  </div>

  <button class="btn btn-primary" onclick="showView('transaction')" data-i18n="add_tx">ADD TRANSACTION</button>
  <button class="btn btn-secondary" onclick="showView('general_stats')" data-i18n="stats">STATISTICS 📊</button>
  <button class="btn btn-secondary" onclick="showView('history')" data-i18n="history">HISTORY 📜</button>
  <button class="btn btn-secondary" onclick="showView('people')" data-i18n="people">PEOPLE 👥</button>
  <button class="btn btn-secondary" onclick="showView('settings')" data-i18n="settings">SETTINGS ⚙️</button>

  <div style="margin-top: 40px; text-align: center;">
    <button class="btn btn-secondary" style="background: transparent; color: #555;" onclick="location.href='index.html'" data-i18n="back_home">EXIT TO HUB</button>
  </div>
</div>

  <div id="view-transaction" class="view">
  <div class="sticky-header">
    <h2 data-i18n="add_tx" style="margin:0">ADD TRANSACTION</h2>
    <button class="btn btn-secondary" style="width: auto; margin:0; padding: 10px 20px;" onclick="showView('welcome')" data-i18n="back">BACK</button>
  </div>

  <div class="toggle-group" id="tx-type-toggle">
    <div class="toggle-btn active" data-type="owe_me" data-i18n="owe_me">Owes me</div>
    <div class="toggle-btn" data-type="i_owe" data-i18n="i_owe">I owe</div>
  </div>

  <div class="form-group">
    <label data-i18n="amount">Amount</label>
    <input type="number" id="tx-amount" step="0.01" placeholder="0.00">
  </div>

  <div class="form-group">
    <label data-i18n="person">Person</label>
    <select id="tx-person">
      <!-- To be filled by JS -->
    </select>
  </div>

  <div class="form-group">
    <label data-i18n="desc">Description (Optional)</label>
    <textarea id="tx-desc" rows="3"></textarea>
  </div>

  <div style="margin-top: 20px;">
    <button class="btn btn-primary" onclick="saveTransaction()" data-i18n="save">SAVE</button>
  </div>
</div>

  <div id="view-history" class="view">
  <div class="sticky-header">
    <h2 data-i18n="history" style="margin:0">HISTORY 📜</h2>
    <button class="btn btn-secondary" style="width: auto; margin:0; padding: 10px 20px;" onclick="showView('welcome')" data-i18n="back">BACK</button>
  </div>
  <div id="history-list">
    <!-- To be filled by JS -->
  </div>
  <div id="history-sentinel" style="height: 20px; margin-top: 10px;"></div>
</div>

<div id="view-people" class="view">
  <div class="sticky-header">
    <h2 data-i18n="people" style="margin:0">PEOPLE 👥</h2>
    <button class="btn btn-secondary" style="width: auto; margin:0; padding: 10px 20px;" onclick="showView('welcome')" data-i18n="back">BACK</button>
  </div>
  
  <div class="card" style="margin-bottom: 20px;">
    <div class="form-group">
      <label data-i18n="person_name">Name</label>
      <input type="text" id="new-person-name" placeholder="...">
    </div>
    <button class="btn btn-primary" onclick="addPerson()" data-i18n="add_person">ADD PERSON</button>
  </div>

  <div id="people-list">
    <!-- To be filled by JS -->
  </div>
</div>

<div id="view-stats" class="view">
  <div class="sticky-header">
    <h2 id="stats-title" style="margin:0">Stats - Person</h2>
    <button class="btn btn-secondary" style="width: auto; margin:0; padding: 10px 20px;" onclick="showView('people')" data-i18n="back">BACK</button>
  </div>
  <div class="card" style="text-align: center;">
    <span class="label" data-i18n="total_balance">Net Balance</span>
    <div id="person-net-balance" style="font-size: 2rem; font-weight: bold;">$0.00</div>
  </div>
  
  <h3 data-i18n="payments">Transactions</h3>
  <div id="person-history-list">
    <!-- To be filled by JS -->
  </div>
  <div id="stats-sentinel" style="height: 20px; margin-top: 10px;"></div>
</div>

  <!-- Missing partial: ./pages/people.html in money-track -->
  <!-- Missing partial: ./pages/stats.html in money-track -->
  <div id="view-general_stats" class="view">
  <div class="sticky-header">
    <h2 data-i18n="stats" style="margin:0">STATISTICS 📊</h2>
    <button class="btn btn-secondary" style="width: auto; margin:0; padding: 10px 20px;" onclick="showView('welcome')" data-i18n="back">BACK</button>
  </div>

  <div class="card">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
      <div>
        <label data-i18n="date_from">From</label>
        <input type="date" id="stats-from" onchange="renderGeneralStats()">
      </div>
      <div>
        <label data-i18n="date_to">To</label>
        <input type="date" id="stats-to" onchange="renderGeneralStats()">
      </div>
    </div>

    <h3 data-i18n="period_summary" style="font-size: 0.9rem; color: var(--text-dim); margin-bottom: 10px;">Period Summary</h3>
    <div style="font-size: 2rem; font-weight: bold;" id="stats-period-net">$0.00</div>
    <div class="balance-grid">
      <div class="balance-item">
        <span class="label" data-i18n="total_owe_me">Owes me</span>
        <span class="value positive" id="stats-period-plus">$0.00</span>
      </div>
      <div class="balance-item">
        <span class="label" data-i18n="total_i_owe">I owe</span>
        <span class="value negative" id="stats-period-minus">$0.00</span>
      </div>
    </div>
  </div>

  <div id="stats-person-breakdown">
    <!-- To be filled by JS: List of persons with their net for this period -->
  </div>
</div>

  <div id="view-settings" class="view">
  <div class="sticky-header">
    <h2 data-i18n="settings" style="margin:0">SETTINGS ⚙️</h2>
    <button class="btn btn-secondary" style="width: auto; margin:0; padding: 10px 20px;" onclick="showView('welcome')" data-i18n="back">BACK</button>
  </div>

  <div class="form-group">
    <label data-i18n="lang">Language</label>
    <select id="lang-selector" onchange="changeLanguage()">
      <option value="es">Español</option>
      <option value="en">English</option>
      <option value="ca">Català</option>
      <option value="eu">Euskara</option>
      <option value="gl">Galego</option>
    </select>
  </div>

  <div class="card" style="margin-top: 30px;">
    <h3 data-i18n="local_data">Local Data</h3>
    <button class="btn btn-secondary" onclick="exportData()" data-i18n="export_json">EXPORT JSON</button>
    <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()" data-i18n="import_json">IMPORT JSON</button>
    <input type="file" id="import-file" style="display:none" onchange="importData(event)" accept=".json">
    <button class="btn btn-danger" onclick="clearAllData()" data-i18n="erase_all" style="margin-top: 20px;">ERASE EVERYTHING</button>
  </div>

  <button class="btn btn-ghost" onclick="generateDummyData()" style="width: auto; padding: 10px; float: right;">STRESS TEST (1000 TX)</button>
</div>


</body>
</html>
