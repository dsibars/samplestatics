<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Static Apps Hub</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .lang-control {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .lang-control select {
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            padding: 5px 10px;
            border-radius: 6px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .app-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }
        .app-card {
            background: #1e293b;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #334155;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .app-card:hover {
            transform: translateY(-5px);
            border-color: #6366f1;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            background: #273549;
        }
        .app-card h2 {
            margin: 0;
            font-size: 1.5rem;
            color: #38bdf8;
        }
        .app-card p {
            margin: 0;
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.5;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            background: #0ea5e9;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
        }
    </style>
  <script type="module" crossorigin>(function polyfill() {
  const relList = document.createElement("link").relList;
  if (relList && relList.supports && relList.supports("modulepreload")) {
    return;
  }
  for (const link of document.querySelectorAll('link[rel="modulepreload"]')) {
    processPreload(link);
  }
  new MutationObserver((mutations) => {
    for (const mutation of mutations) {
      if (mutation.type !== "childList") {
        continue;
      }
      for (const node of mutation.addedNodes) {
        if (node.tagName === "LINK" && node.rel === "modulepreload")
          processPreload(node);
      }
    }
  }).observe(document, { childList: true, subtree: true });
  function getFetchOpts(link) {
    const fetchOpts = {};
    if (link.integrity) fetchOpts.integrity = link.integrity;
    if (link.referrerPolicy) fetchOpts.referrerPolicy = link.referrerPolicy;
    if (link.crossOrigin === "use-credentials")
      fetchOpts.credentials = "include";
    else if (link.crossOrigin === "anonymous") fetchOpts.credentials = "omit";
    else fetchOpts.credentials = "same-origin";
    return fetchOpts;
  }
  function processPreload(link) {
    if (link.ep)
      return;
    link.ep = true;
    const fetchOpts = getFetchOpts(link);
    fetch(link.href, fetchOpts);
  }
})();
const TRANSLATIONS = {
  es: {
    hub_title: "Panel de Aplicaciones",
    app_workout_title: "Entrenamiento Diario",
    app_workout_desc: "Un rastreador de entrenamiento de 15 minutos con historial y estadísticas.",
    static_badge: "App Estática",
    lang: "Idioma"
  },
  en: {
    hub_title: "App Hub",
    app_workout_title: "Daily Routine Exercise",
    app_workout_desc: "A simple 15-minute workout tracker with history and statistics.",
    static_badge: "Static App",
    lang: "Language"
  },
  ca: {
    hub_title: "Panell d'Aplicacions",
    app_workout_title: "Entrenament Diari",
    app_workout_desc: "Un rastrejador d'entrenament de 15 minuts amb historial i estadístiques.",
    static_badge: "App Estàtica",
    lang: "Idioma"
  },
  eu: {
    hub_title: "Aplikazioen Panela",
    app_workout_title: "Eguneroko Entrenamendua",
    app_workout_desc: "15 minutuko entrenamendu-aztergailua historia eta estatistikekin.",
    static_badge: "App Estatikoa",
    lang: "Hizkuntza"
  },
  gl: {
    hub_title: "Panel de Aplicacións",
    app_workout_title: "Adestramento Diario",
    app_workout_desc: "Un rastreador de adestramento de 15 minutos con historial e estatísticas.",
    static_badge: "App Estática",
    lang: "Idioma"
  }
};
const SHARED_KEY = "static_apps_lang";
const OLD_KEY = "workout_lang";
if (!localStorage.getItem(SHARED_KEY) && localStorage.getItem(OLD_KEY)) {
  localStorage.setItem(SHARED_KEY, localStorage.getItem(OLD_KEY));
}
let currentLang = localStorage.getItem(SHARED_KEY) || "es";
function t(key) {
  if (!TRANSLATIONS[currentLang]) return key;
  return TRANSLATIONS[currentLang][key] || TRANSLATIONS["es"][key] || key;
}
function changeLanguage() {
  currentLang = document.getElementById("lang-selector").value;
  localStorage.setItem("static_apps_lang", currentLang);
  location.reload();
}
function applyTranslations() {
  document.documentElement.lang = currentLang;
  const selector = document.getElementById("lang-selector");
  if (selector) selector.value = currentLang;
  document.querySelectorAll("[data-i18n]").forEach((el) => {
    el.innerHTML = t(el.getAttribute("data-i18n"));
  });
}
window.onload = () => {
  applyTranslations();
};
window.changeLanguage = changeLanguage;</script>
</head>
<body>
    <div class="lang-control">
        <label for="lang-selector" data-i18n="lang">Language</label>
        <select id="lang-selector" onchange="changeLanguage()">
            <option value="es">Español</option>
            <option value="en">English</option>
            <option value="ca">Català</option>
            <option value="eu">Euskara</option>
            <option value="gl">Galego</option>
        </select>
    </div>

    <h1 data-i18n="hub_title">App Hub</h1>
    <div class="app-list">
        <a href="./daily-routine-exercise.html" class="app-card">
            <span class="badge" data-i18n="static_badge">Static App</span>
            <h2 data-i18n="app_workout_title">Daily Routine Exercise</h2>
            <p data-i18n="app_workout_desc">A simple 15-minute workout tracker with history and statistics.</p>
        </a>
        <!-- Add more apps here manually as we create them -->
    </div>

</body>
</html>
