class ProgressionManager {
  constructor() {
    this.coreKey = "rpg_cores";
    this.progKey = "rpg_progression";
    this.loadState();
  }
  loadState() {
    this.cores = parseInt(localStorage.getItem(this.coreKey)) || 0;
    const defaultProg = {
      heroes: [],
      // Max 4
      village: {
        tavernLevel: 1,
        shopLevel: 1
      },
      milestone: 0,
      gold: 100,
      inventory: {
        tiny_potion: 0,
        tiny_mana_potion: 0
      },
      upgrades: {
        attack_boost: 0,
        defense_boost: 0,
        hp_boost: 0
      }
    };
    try {
      const saved = JSON.parse(localStorage.getItem(this.progKey));
      if (saved) {
        this.prog = { ...defaultProg, ...saved };
        if (this.prog.heroes) {
          this.prog.heroes.forEach((h) => {
            if (h.skills) {
              ["small", "medium", "big"].forEach((tier) => {
                if (h.skills[`${tier}_ice_ball`] !== void 0) {
                  h.skills[`${tier}_water_ball`] = h.skills[`${tier}_ice_ball`];
                  delete h.skills[`${tier}_ice_ball`];
                }
              });
            }
          });
        }
      } else {
        this.prog = defaultProg;
      }
    } catch (e) {
      this.prog = defaultProg;
    }
  }
  saveState() {
    localStorage.setItem(this.coreKey, this.cores);
    localStorage.setItem(this.progKey, JSON.stringify(this.prog));
  }
  addCores(amount) {
    this.cores += amount;
    this.saveState();
  }
  spendCores(amount) {
    if (this.cores >= amount) {
      this.cores -= amount;
      this.saveState();
      return true;
    }
    return false;
  }
  addGold(amount) {
    this.prog.gold += amount;
    this.saveState();
  }
  spendGold(amount) {
    if (this.prog.gold >= amount) {
      this.prog.gold -= amount;
      this.saveState();
      return true;
    }
    return false;
  }
  addHero(hero) {
    if (this.prog.heroes.length < 4) {
      this.prog.heroes.push(hero);
      this.saveState();
      return true;
    }
    return false;
  }
  updateHero(index, heroData) {
    if (this.prog.heroes[index]) {
      this.prog.heroes[index] = { ...this.prog.heroes[index], ...heroData };
      this.saveState();
    }
  }
  getUpgradeCost(upgradeId) {
    const level = this.prog.upgrades[upgradeId] || 0;
    return (level + 1) * 5;
  }
  buyUpgrade(upgradeId) {
    const cost = this.getUpgradeCost(upgradeId);
    if (this.spendCores(cost)) {
      this.prog.upgrades[upgradeId] = (this.prog.upgrades[upgradeId] || 0) + 1;
      this.saveState();
      return true;
    }
    return false;
  }
  setMilestone(value) {
    if (value > this.prog.milestone) {
      this.prog.milestone = value;
      this.saveState();
    }
  }
  resetMilestone() {
    this.prog.milestone = 0;
    this.saveState();
  }
  removeHero(index) {
    if (this.prog.heroes.length > 1) {
      this.prog.heroes.splice(index, 1);
      this.saveState();
      return true;
    }
    return false;
  }
  addItem(itemId, count = 1) {
    this.prog.inventory[itemId] = (this.prog.inventory[itemId] || 0) + count;
    this.saveState();
  }
  useItem(itemId) {
    if (this.prog.inventory[itemId] > 0) {
      this.prog.inventory[itemId]--;
      this.saveState();
      return true;
    }
    return false;
  }
}
const Progression = new ProgressionManager();
class Hero {
  constructor(data) {
    this.name = data.name;
    this.level = data.level || 1;
    this.exp = data.exp || 0;
    this.statPoints = data.statPoints || 0;
    this.skillPoints = data.skillPoints || 0;
    const boosts = Progression.prog.upgrades || {};
    this.baseMaxHp = data.baseMaxHp || data.maxHp || 10;
    this.maxHp = this.baseMaxHp + (boosts.hp_boost || 0) * 10;
    this.hp = data.hp ?? this.maxHp;
    this.baseMaxMp = data.baseMaxMp || data.maxMp || 5;
    this.maxMp = this.baseMaxMp;
    this.mp = data.mp ?? this.maxMp;
    this.baseStrength = data.baseStrength || data.strength || 1;
    this.strength = this.baseStrength + (boosts.attack_boost || 0);
    this.baseSpeed = data.baseSpeed || data.speed || 1;
    this.speed = this.baseSpeed;
    this.baseDefense = data.baseDefense || data.defense || 1;
    this.defense = this.baseDefense + (boosts.defense_boost || 0);
    this.baseMagicPower = data.baseMagicPower || data.magicPower || 1;
    this.magicPower = this.baseMagicPower;
    this.skills = data.skills;
    if (Array.isArray(this.skills)) {
      const skillMap = {};
      this.skills.forEach((id) => skillMap[id] = 0);
      this.skills = skillMap;
    } else if (!this.skills || typeof this.skills !== "object") {
      this.skills = { basic_attack: 0 };
    }
    this.origin = data.origin || "origin_warrior_frustrated";
  }
  static generateRandom(level = 1) {
    const names = ["Alaric", "Kaelen", "Thorne", "Valerius", "Elowen", "Zephyr", "Ione", "Thalric"];
    const name = names[Math.floor(Math.random() * names.length)];
    const origins = [
      "origin_clown",
      "origin_warrior_frustrated",
      "origin_thief_bored",
      "origin_cook_angry",
      "origin_farmer_lost",
      "origin_guard_lazy",
      "origin_monk_silent",
      "origin_poet_sad"
    ];
    const origin = origins[Math.floor(Math.random() * origins.length)];
    let stats = {
      name,
      origin,
      level,
      exp: 0,
      statPoints: 10,
      skillPoints: (level - 1) * 1,
      baseMaxHp: 10 + (level - 1) * 5,
      baseMaxMp: 5 + (level - 1) * 2,
      baseStrength: 1,
      baseSpeed: 1,
      baseDefense: 1,
      baseMagicPower: 1,
      skills: { basic_attack: 0 }
    };
    return new Hero(stats);
  }
  gainExp(amount) {
    this.exp += amount;
    const nextLevelExp = this.level * 20;
    if (this.exp >= nextLevelExp) {
      this.levelUp();
      return true;
    }
    return false;
  }
  levelUp() {
    this.level++;
    this.exp = 0;
    this.statPoints += this.level % 5 === 0 ? 3 : 2;
    this.skillPoints += 1;
    this.hp = this.maxHp;
    this.mp = this.maxMp;
  }
  recalculateStats() {
    const boosts = Progression.prog.upgrades || {};
    this.maxHp = this.baseMaxHp + (boosts.hp_boost || 0) * 10;
    this.maxMp = this.baseMaxMp;
    this.strength = this.baseStrength + (boosts.attack_boost || 0);
    this.speed = this.baseSpeed;
    this.defense = this.baseDefense + (boosts.defense_boost || 0);
    this.magicPower = this.baseMagicPower;
    this.hp = Math.min(this.hp, this.maxHp);
    this.mp = Math.min(this.mp, this.maxMp);
  }
  draw(ctx, x, y, isTurn) {
    ctx.fillStyle = "#0af";
    if (this.hp <= 0) ctx.fillStyle = "#444";
    ctx.fillRect(x - 20, y - 20, 40, 40);
    if (isTurn) {
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.strokeRect(x - 22, y - 22, 44, 44);
    }
    ctx.fillStyle = "#fff";
    ctx.font = "12px Outfit";
    ctx.textAlign = "center";
    ctx.fillText(this.name, x, y - 30);
    ctx.fillStyle = "#000";
    ctx.fillRect(x - 20, y + 25, 40, 5);
    ctx.fillStyle = "#0f0";
    ctx.fillRect(x - 20, y + 25, 40 * (this.hp / this.maxHp), 5);
    ctx.fillStyle = "#000";
    ctx.fillRect(x - 20, y + 32, 40, 3);
    ctx.fillStyle = "#0af";
    ctx.fillRect(x - 20, y + 32, 40 * (this.mp / this.maxMp), 3);
  }
  toJSON() {
    return {
      name: this.name,
      level: this.level,
      exp: this.exp,
      statPoints: this.statPoints,
      skillPoints: this.skillPoints,
      baseMaxHp: this.baseMaxHp,
      hp: this.hp,
      baseMaxMp: this.baseMaxMp,
      mp: this.mp,
      baseStrength: this.baseStrength,
      baseSpeed: this.baseSpeed,
      baseDefense: this.baseDefense,
      baseMagicPower: this.baseMagicPower,
      skills: this.skills,
      origin: this.origin
    };
  }
}
class Enemy {
  constructor(name, level, stats, isBoss = false, element = "neutral") {
    this.name = name;
    this.level = level;
    this.isBoss = isBoss;
    this.element = element;
    this.maxHp = stats.hp;
    this.hp = this.maxHp;
    this.strength = stats.strength;
    this.speed = stats.speed;
    this.defense = stats.defense;
    this.magicPower = stats.magicPower || 1;
  }
  static generate(level, milestone) {
    const names = ["Slime", "Goblin", "Wolf", "Skeleton", "Orc", "Dark Knight"];
    const nameIdx = Math.min(names.length - 1, Math.floor(milestone / 10));
    const name = names[nameIdx];
    const isBoss = milestone % 5 === 0;
    const bossesPassed = Math.floor(milestone / 5);
    const postBossesPassed = Math.floor((milestone - 1) / 5);
    const totalStacks = Math.max(0, bossesPassed - 2 + (postBossesPassed - 2));
    const multiplier = Math.pow(1.3, totalStacks);
    let stats = {
      hp: (8 + level * 4) * multiplier,
      strength: (2 + level * 1.5) * multiplier,
      speed: (1 + level * 0.5) * multiplier,
      defense: level * 0.5 * multiplier,
      magicPower: level * 0.5 * multiplier
    };
    let element = "neutral";
    if (milestone <= 10) {
      element = "neutral";
      if (milestone <= 3) {
        stats.speed = 1;
        stats.defense = 0;
        stats.strength = 3;
      } else if (milestone === 4) {
        stats.speed = 2;
        stats.defense = 0.5;
        stats.strength = 5;
      } else if (milestone === 5) {
        stats.speed = 3.5;
        stats.defense = 1;
        stats.strength = 10;
        stats.hp *= 1.5;
      } else if (milestone <= 9) {
        stats.speed = 4;
        stats.defense = 2;
        stats.strength = 12;
      } else if (milestone === 10) {
        stats.speed = 5;
        stats.defense = 4;
        stats.strength = 20;
        stats.hp *= 1.5;
      }
    } else if (milestone <= 15) {
      stats.defense *= 1.5;
      if (isBoss) {
        stats.defense *= 1.7;
        stats.hp *= 1.5;
      }
    } else if (milestone <= 20) {
      stats.strength *= 1.7;
      stats.speed *= 0.7;
      if (isBoss) {
        stats.strength *= 1.3;
        stats.speed *= 0.8;
        stats.hp *= 1.5;
      }
    } else if (milestone <= 40) {
      if (milestone <= 25) element = "fire";
      else if (milestone <= 30) element = "water";
      else if (milestone <= 35) element = "wind";
      else if (milestone <= 40) element = "storm";
      if (isBoss) {
        stats.hp *= 1.5;
        stats.strength *= 1.2;
        stats.speed *= 1.2;
      }
    } else {
      const elementRand = Math.random();
      if (elementRand > 0.33) {
        const elements = ["fire", "water", "wind", "storm"];
        element = elements[Math.floor(Math.random() * elements.length)];
      }
      if (isBoss) {
        stats.hp *= 1.5;
        stats.strength *= 1.2;
        stats.speed *= 1.2;
      }
    }
    return new Enemy(isBoss ? `Giant ${name}` : name, level, stats, isBoss, element);
  }
  draw(ctx, x, y) {
    ctx.fillStyle = this.isBoss ? "#f0f" : "#f55";
    if (this.hp <= 0) ctx.fillStyle = "#444";
    ctx.beginPath();
    ctx.arc(x, y, this.isBoss ? 40 : 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.font = "bold 16px Outfit";
    ctx.textAlign = "center";
    ctx.fillText(`Lvl ${this.level} ${this.name}`, x, y - 50);
    const barWidth = 120;
    ctx.fillStyle = "#000";
    ctx.fillRect(x - barWidth / 2, y + 50, barWidth, 10);
    ctx.fillStyle = "#f55";
    ctx.fillRect(x - barWidth / 2, y + 50, barWidth * (this.hp / this.maxHp), 10);
    ctx.fillStyle = "#fff";
    ctx.font = "10px Outfit";
    ctx.fillText(`${Math.ceil(this.hp)} / ${this.maxHp}`, x, y + 60);
    this.drawElementDiagram(ctx, x - 100, y);
  }
  drawElementDiagram(ctx, x, y) {
    const positions = {
      fire: { x: 0, y: -25, color: "#ff4444" },
      wind: { x: 25, y: 0, color: "#44ff44" },
      storm: { x: 0, y: 25, color: "#ffff44" },
      water: { x: -25, y: 0, color: "#4444ff" }
    };
    const elements = ["fire", "wind", "storm", "water"];
    ctx.save();
    ctx.translate(x, y);
    ctx.strokeStyle = "#666";
    ctx.lineWidth = 2;
    elements.forEach((el, i) => {
      const start = positions[el];
      const next = positions[elements[(i + 1) % 4]];
      this.drawArrow(ctx, start.x, start.y, next.x, next.y);
    });
    elements.forEach((el) => {
      const pos = positions[el];
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 8, 0, Math.PI * 2);
      ctx.strokeStyle = pos.color;
      ctx.lineWidth = 1;
      ctx.stroke();
      if (this.element === el) {
        ctx.fillStyle = pos.color;
        ctx.fill();
      }
    });
    ctx.restore();
  }
  drawArrow(ctx, x1, y1, x2, y2) {
    const headlen = 5;
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const ox = Math.cos(angle) * 10;
    const oy = Math.sin(angle) * 10;
    const sx = x1 + ox;
    const sy = y1 + oy;
    const ex = x2 - ox;
    const ey = y2 - oy;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - headlen * Math.cos(angle - Math.PI / 6), ey - headlen * Math.sin(angle - Math.PI / 6));
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - headlen * Math.cos(angle + Math.PI / 6), ey - headlen * Math.sin(angle + Math.PI / 6));
    ctx.stroke();
  }
}

const SHARED_KEY = "static_apps_lang";
let currentLang = localStorage.getItem(SHARED_KEY) || "en";
function t(key) {
  const lang = TRANSLATIONS[currentLang] ? currentLang : "en";
  return TRANSLATIONS[lang][key] || TRANSLATIONS["en"][key] || key;
}
function applyTranslations() {
  document.documentElement.lang = currentLang;
  const selector = document.getElementById("lang-selector");
  if (selector) selector.value = currentLang;
  document.querySelectorAll("[data-i18n]").forEach((el) => {
    const key = el.getAttribute("data-i18n");
    el.innerText = t(key);
  });
}
function changeLanguage() {
  const selector = document.getElementById("lang-selector");
  if (selector) {
    currentLang = selector.value;
    localStorage.setItem(SHARED_KEY, currentLang);
    location.reload();
  }
}
class CombatManager {
  constructor(game2, heroes, enemy) {
    this.game = game2;
    this.heroes = heroes;
    this.enemy = enemy;
    this.turnOrder = [];
    this.currentTurnIndex = 0;
    this.isCombatOver = false;
    this.isActionInProgress = false;
    this.autoTurnTimeout = null;
    this.itemUsedThisTurn = false;
    this.initTurnOrder();
  }
  stop() {
    this.isCombatOver = true;
    clearTimeout(this.autoTurnTimeout);
  }
  initTurnOrder() {
    this.turnOrder = [...this.heroes, this.enemy].sort((a, b) => b.speed - a.speed);
  }
  nextTurn() {
    if (this.isCombatOver) return;
    const participant = this.turnOrder[this.currentTurnIndex];
    if (participant.hp <= 0) {
      this.advanceTurn();
      return;
    }
    if (participant === this.enemy) {
      this.enemyTurn();
    } else {
      const turnMsg = t("s_turn").replace("{hero}", participant.name);
      this.game.log(participant.name + turnMsg);
      if (this.game.autoBattle) {
        this.heroAutoTurn(participant);
      } else {
        this.game.showActionPanel(participant);
      }
    }
  }
  heroAutoTurn(hero) {
    clearTimeout(this.autoTurnTimeout);
    this.autoTurnTimeout = setTimeout(() => {
      if (this.isCombatOver || hero.hp <= 0 || !this.game.autoBattle) return;
      const validSkills = Object.keys(hero.skills).filter((s) => {
        const data = SKILLS_DATA[s];
        if (!data) return false;
        if (hero.mp < data.mpCost) return false;
        return true;
      });
      const action = validSkills[Math.floor(Math.random() * validSkills.length)] || "basic_attack";
      const skill = SKILLS_DATA[action];
      let target = null;
      if (skill && skill.category === "support" && skill.targetType === "ally") {
        const sortedAllies = [...this.heroes].filter((h) => h.hp > 0).sort((a, b) => a.hp / a.maxHp - b.hp / b.maxHp);
        if (sortedAllies.length > 0) {
          target = this.heroes.indexOf(sortedAllies[0]);
        }
      }
      this.heroAction(hero, action, target);
    }, 500);
  }
  advanceTurn() {
    this.isActionInProgress = false;
    this.itemUsedThisTurn = false;
    if (this.checkCombatEnd()) return;
    this.currentTurnIndex = (this.currentTurnIndex + 1) % this.turnOrder.length;
    this.nextTurn();
  }
  checkCombatEnd() {
    if (this.enemy.hp <= 0) {
      this.isCombatOver = true;
      this.game.endCombat("win");
      return true;
    }
    const allHeroesDead = this.heroes.every((h) => h.hp <= 0);
    if (allHeroesDead) {
      this.isCombatOver = true;
      this.game.endCombat("lose");
      return true;
    }
    return false;
  }
  applyDamage(target, amount) {
    target.hp = Math.max(0, target.hp - amount);
    if (this.game.onDamage) this.game.onDamage(target, amount);
    if (target.hp === 0) {
      if (this.game.onDeath) this.game.onDeath(target);
    }
  }
  getFinalStat(entity, statName) {
    let baseVal = entity[statName] || 0;
    return Math.max(1, baseVal);
  }
  calculateDamageMultiplier(attackValue, defenseValue) {
    if (defenseValue <= 0) defenseValue = 1;
    const R = attackValue / defenseValue;
    if (R >= 10) return R / 10;
    if (R >= 5) return 1;
    if (R >= 4) return 0.9 + (R - 4) * 0.1;
    if (R >= 2) return 0.75 + (R - 2) * 0.075;
    if (R >= 1) return 0.5 + (R - 1) * 0.25;
    return R * 0.5;
  }
  getElementMultiplier(skillElement, targetElement) {
    if (!skillElement || !targetElement || targetElement === "neutral") return 1;
    if (skillElement === targetElement) return 1;
    const relationships = {
      fire: "wind",
      wind: "storm",
      storm: "water",
      water: "fire"
    };
    if (relationships[skillElement] === targetElement) return 1.5;
    if (relationships[targetElement] === skillElement) return 0.5;
    return 1;
  }
  calculateEvasionChance(attacker, defender) {
    const sAttacker = this.getFinalStat(attacker, "speed");
    const sDefender = this.getFinalStat(defender, "speed");
    const R = sDefender / sAttacker;
    if (R <= 1) {
      return Math.max(0, (R - 0.5) * 20);
    } else {
      return 10 + R * 10;
    }
  }
  heroAction(hero, skillId, targetIndex = null) {
    if (this.isActionInProgress || this.isCombatOver) return;
    const skillData = SKILLS_DATA[skillId];
    if (!skillData) return;
    if (hero.mp < skillData.mpCost) {
      this.game.log(t("not_enough_mp") || "Not enough MP!");
      this.game.showActionPanel(hero);
      return;
    }
    this.isActionInProgress = true;
    clearTimeout(this.autoTurnTimeout);
    hero.mp -= skillData.mpCost;
    const level = hero.skills[skillId] || 0;
    const multiplier = 1 + 5e-3 * (skillData.tier || 1) * level;
    const baseStatValue = hero[skillData.stat] || 1;
    let logMsg = "";
    let delay = 500;
    if (skillData.category === "support") {
      const power = skillData.power || 0.1;
      const finalPercentage = power * multiplier;
      if (skillData.targetType === "all") {
        this.heroes.forEach((h) => {
          if (h.hp > 0) {
            const amount = Math.floor(h.maxHp * finalPercentage);
            h.hp = Math.min(h.maxHp, h.hp + amount);
            if (this.game.onHeal) this.game.onHeal(h, amount);
          }
        });
        logMsg = t("log_heals_all").replace("{attacker}", hero.name);
      } else {
        const targetHero = targetIndex !== null ? this.heroes[targetIndex] : hero;
        const amount = Math.floor(targetHero.maxHp * finalPercentage);
        targetHero.hp = Math.min(targetHero.maxHp, targetHero.hp + amount);
        logMsg = t("log_heals").replace("{attacker}", hero.name).replace("{target}", targetHero.name).replace("{amount}", amount);
        if (this.game.onHeal) this.game.onHeal(targetHero, amount);
      }
    } else {
      const damageMultiplier = skillData.baseMultiplier || 1;
      const rawDamage = baseStatValue * damageMultiplier * multiplier;
      const evasionChance = this.calculateEvasionChance(hero, this.enemy);
      if (Math.random() * 100 < evasionChance) {
        this.game.log(t("log_miss").replace("{attacker}", hero.name).replace("{target}", this.enemy.name));
        if (this.game.onDamage) this.game.onDamage(this.enemy, t("miss_label") || "Miss!");
      } else {
        const targetDefense = this.getFinalStat(this.enemy, "defense");
        const defMult = this.calculateDamageMultiplier(rawDamage, targetDefense);
        const elementMult = this.getElementMultiplier(skillData.element, this.enemy.element);
        const finalDamage = Math.max(1, Math.floor(rawDamage * defMult * elementMult));
        let elementFeedback = "";
        if (elementMult > 1) {
          elementFeedback = `[${t("effective") || "Effective!"}] `;
        } else if (elementMult < 1) {
          elementFeedback = `[${t("resisted") || "Resisted"}] `;
        }
        if (skillId === "double_attack") {
          this.applyDamage(this.enemy, finalDamage);
          setTimeout(() => this.applyDamage(this.enemy, finalDamage), 300);
          logMsg = elementFeedback + t("log_uses_skill").replace("{attacker}", hero.name).replace("{skill}", t(skillId));
          delay += 300;
        } else if (skillId === "triple_attack") {
          this.applyDamage(this.enemy, finalDamage);
          setTimeout(() => this.applyDamage(this.enemy, finalDamage), 300);
          setTimeout(() => this.applyDamage(this.enemy, finalDamage), 600);
          logMsg = elementFeedback + t("log_uses_skill").replace("{attacker}", hero.name).replace("{skill}", t(skillId));
          delay += 600;
        } else {
          this.applyDamage(this.enemy, finalDamage);
          if (skillId === "basic_attack") {
            logMsg = elementFeedback + t("log_attack").replace("{attacker}", hero.name).replace("{target}", this.enemy.name).replace("{damage}", finalDamage);
          } else {
            logMsg = elementFeedback + t("log_uses_skill").replace("{attacker}", hero.name).replace("{skill}", t(skillId));
          }
        }
      }
    }
    this.game.log(logMsg);
    if (this.enemy.hp === 0) delay += 1e3;
    setTimeout(() => this.advanceTurn(), delay);
  }
  useItem(hero, itemId) {
    if (this.isActionInProgress || this.isCombatOver) return;
    this.isActionInProgress = true;
    clearTimeout(this.autoTurnTimeout);
    if (itemId === "tiny_potion") {
      const heal = Math.floor(hero.maxHp * 0.3);
      hero.hp = Math.min(hero.maxHp, hero.hp + heal);
      if (this.game.onHeal) this.game.onHeal(hero, heal);
      this.game.log(t("log_uses_item").replace("{attacker}", hero.name).replace("{item}", t(itemId)));
    } else if (itemId === "tiny_mana_potion") {
      const restore = Math.floor(hero.maxMp * 0.3);
      hero.mp = Math.min(hero.maxMp, hero.mp + restore);
      this.game.log(t("log_uses_item").replace("{attacker}", hero.name).replace("{item}", t(itemId)));
    }
    this.itemUsedThisTurn = true;
    this.isActionInProgress = false;
    setTimeout(() => this.game.showActionPanel(hero), 500);
  }
  enemyTurn() {
    const aliveHeroes = this.heroes.filter((h) => h.hp > 0);
    if (aliveHeroes.length === 0) {
      this.advanceTurn();
      return;
    }
    const target = aliveHeroes[Math.floor(Math.random() * aliveHeroes.length)];
    const evasionChance = this.calculateEvasionChance(this.enemy, target);
    if (Math.random() * 100 < evasionChance) {
      this.game.log(t("log_miss").replace("{attacker}", this.enemy.name).replace("{target}", target.name));
      if (this.game.onDamage) this.game.onDamage(target, t("miss_label") || "Miss!");

class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1;
    this.decay = Math.random() * 0.05 + 0.02;
    this.size = Math.random() * 3 + 2;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
    this.vx *= 0.95;
    this.vy *= 0.95;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}
class FloatingText {
  constructor(x, y, text, color = "#fff") {
    this.x = x;
    this.y = y;
    this.text = text;
    this.color = color;
    this.life = 1;
    this.decay = 0.015;
    this.vy = -1.5;
  }
  update() {
    this.y += this.vy;
    this.life -= this.decay;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.font = "bold 16px Outfit";
    ctx.textAlign = "center";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;
    ctx.strokeText(this.text, this.x, this.y);
    ctx.fillText(this.text, this.x, this.y);
    ctx.globalAlpha = 1;
  }
}

    { id: "baseMaxMp", label: t("stat_mp"), val: heroData.baseMaxMp },
    { id: "baseStrength", label: t("stat_attack"), val: heroData.baseStrength },
    { id: "baseSpeed", label: t("stat_speed"), val: heroData.baseSpeed },
    { id: "baseDefense", label: t("stat_defense"), val: heroData.baseDefense },
    { id: "baseMagicPower", label: t("stat_magic"), val: heroData.baseMagicPower }
  ];
  stats.forEach((st) => {
    const row = document.createElement("div");
    row.style = "display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 5px;";
    const canUpgrade = heroData.statPoints > 0;
    row.innerHTML = `
            <div><span style="font-weight:bold; color: #aaa;">${st.label}:</span> <span style="font-size:1.1rem; color:white;">${st.val}</span></div>
            <button class="menu-btn ${canUpgrade ? "primary" : "secondary"}" style="padding: 5px 15px; width: 40px;" ${canUpgrade ? "" : "disabled"} onclick="window.increaseStat(${index}, '${st.id}')">+</button>
        `;
    statsContainer.appendChild(row);
  });
  const fireContainer = document.createElement("div");
  fireContainer.style = "margin-top: 20px; text-align: center;";
  const canFire = Progression.prog.heroes.length > 1;
  fireContainer.innerHTML = `
        <button class="menu-btn ${canFire ? "secondary" : "secondary"}" 
                style="padding: 10px 20px; font-size: 0.9rem; border-color: #f55; color: #f55; ${canFire ? "" : "opacity: 0.3; cursor: default;"}" 
                ${canFire ? `onclick="window.fireHero(${index})"` : ""}>
            🗑️ ${t("btn_fire_hero")}
        </button>
    `;
  statsContainer.appendChild(fireContainer);
  showView("view-hero-details");
};
window.fireHero = (index) => {
  const heroData = Progression.prog.heroes[index];
  if (!heroData) return;
  if (Progression.prog.heroes.length <= 1) {
    alert(t("fire_limit_msg"));
    return;
  }
  if (confirm(t("confirm_fire").replace("{hero}", heroData.name))) {
    if (Progression.removeHero(index)) {
      window.showVillage();
    }
  }
};
window.increaseStat = (index, statId) => {
  const heroData = Progression.prog.heroes[index];
  if (heroData && heroData.statPoints > 0) {
    heroData.statPoints--;
    const gain = statId === "baseMaxHp" ? 3 : statId === "baseMaxMp" ? 2 : 1;
    heroData[statId] = (heroData[statId] || 0) + gain;
    if (statId === "baseMaxHp") heroData.hp += 3;
    if (statId === "baseMaxMp") heroData.mp += 2;
    Progression.updateHero(index, heroData);
    window.showHeroDetails(index);
  }
};
window.currentSkillTab = "physical";
window.switchSkillTab = (tab) => {
  window.currentSkillTab = tab;
  const tabs = ["physical", "magic", "tricker", "support"];
  tabs.forEach((t2) => {
    const btn = document.getElementById(`skill-tab-${t2}`);
    if (btn) btn.className = tab === t2 ? "menu-btn primary" : "menu-btn secondary";
  });
  window.showHeroSkills();
};
window.showHeroSkills = (index) => {
  if (index === void 0) index = window.currentHeroIndex;
  const heroData = Progression.prog.heroes[index];
  if (!heroData) return;
  document.getElementById("hero-skills-sp").innerText = heroData.skillPoints;
  document.getElementById("label-skills-sp").innerText = t("skill_points") + ":";
  const skillsContainer = document.getElementById("hero-skills-container");
  skillsContainer.innerHTML = "";
  const categorySkills = Object.values(SKILLS_DATA).filter((sk) => sk.category === window.currentSkillTab);
  categorySkills.forEach((sk) => {
    const currentLevel = heroData.skills[sk.id];
    const isUnlocked = currentLevel !== void 0;
    let isVisible = false;
    if (sk.tier === 1) isVisible = true;
    else if (sk.dependency && heroData.skills[sk.dependency] !== void 0) isVisible = true;
    if (!isVisible) return;
    const row = document.createElement("div");
    row.style = "background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 10px;";
    let actionHTML = "";
    if (!isUnlocked) {
      const canAfford = heroData.skillPoints >= sk.unlockCost;
      actionHTML = `
                <div style="display:flex; justify-content: space-between; align-items: center;">
                    <div style="font-size: 0.8rem; color: #aaa;">${t(sk.id + "_desc")}</div>
                    <button class="menu-btn ${canAfford ? "primary" : "secondary"}" style="padding: 5px 15px;" ${canAfford ? "" : "disabled"} onclick="window.learnSkill(${index}, '${sk.id}', true)">${t("learn_skill_btn")} (${sk.unlockCost} SP)</button>
                </div>
            `;
    } else {
      const multiplier = 1 + 5e-3 * sk.tier * currentLevel;
      const enhanceCost = Math.max(1, sk.tier * currentLevel);
      const canEnhance = heroData.skillPoints >= enhanceCost;
      actionHTML = `
                <div style="display:flex; justify-content: space-between; align-items: center; width: 100%;">
                    <div style="display: flex; flex-direction: column; gap: 2px;">
                        <div style="font-size: 0.8rem; color: #aaa;">${t(sk.id + "_desc")}</div>
                        <div style="font-size: 0.8rem; color: #0af;">${t("level_label")} ${currentLevel} (+${((multiplier - 1) * 100).toFixed(1)}%)</div>
                    </div>
                    <button class="menu-btn ${canEnhance ? "primary" : "secondary"}" style="padding: 5px 15px; margin-left: 10px;" ${canEnhance ? "" : "disabled"} onclick="window.learnSkill(${index}, '${sk.id}', false)">${t("enhance")} (${enhanceCost} SP)</button>
                </div>
            `;
    }
    row.innerHTML = `
            <div style="font-weight:bold; color: white; margin-bottom: 5px;">${t(sk.id)} <span style="font-size:0.7rem; color:#888;">Tier ${sk.tier}</span></div>
            ${actionHTML}
        `;
    skillsContainer.appendChild(row);
  });
  showView("view-hero-skills");
};
window.learnSkill = (index, skillId, isUnlock) => {
  const heroData = Progression.prog.heroes[index];
  const skillData = SKILLS_DATA[skillId];
  if (!heroData || !skillData) return;
  if (isUnlock) {
    if (heroData.skillPoints >= skillData.unlockCost) {
      heroData.skillPoints -= skillData.unlockCost;
      heroData.skills[skillId] = 0;
      Progression.updateHero(index, heroData);
      window.showHeroSkills(index);
    }
  } else {
    const currentLevel = heroData.skills[skillId];
    const enhanceCost = Math.max(1, skillData.tier * currentLevel);
    if (heroData.skillPoints >= enhanceCost) {
      heroData.skillPoints -= enhanceCost;
      heroData.skills[skillId]++;
      Progression.updateHero(index, heroData);
      window.showHeroSkills(index);
    }
  }
};
window.buyUpgrade = (upgradeId) => {
  if (Progression.buyUpgrade(upgradeId)) {
    updateVillageUI();
  } else {
    alert(t("not_enough_cores"));
  }
};
window.buyItem = (itemId, cost) => {

    Progression.spendGold(cost);
    Progression.addItem(itemId);
    updateVillageUI();
  } else {
    alert(t("not_enough_gold"));
  }
};
window.showSettings = () => {

};
window.changeLanguage = () => {

};
window.clearGameData = () => {

    localStorage.removeItem("rpg_progression");
    Progression.loadState();
    alert(t("wipe_success"));
    window.showMenu();
  }
};
window.toggleAutoBattle = (checked) => {
  localStorage.setItem("rpg_autobattle", checked ? "true" : "false");
  if (game) {
    game.autoBattle = checked;
    if (checked && game.currentCombat && !game.currentCombat.isCombatOver) {
      const participant = game.currentCombat.turnOrder[game.currentCombat.currentTurnIndex];
      if (participant && game.heroes.includes(participant)) {
        game.currentCombat.heroAutoTurn(participant);
      }
    }
  }
};
window.toggleCombatLog = () => {
  const logOverlay = document.getElementById("combat-log");
  const toggleText = document.getElementById("log-toggle-text");
  if (logOverlay.style.display === "none" || logOverlay.style.display === "") {
    logOverlay.style.display = "block";
    toggleText.innerText = t("hide_logs") || "Hide Logs";
  } else {
    logOverlay.style.display = "none";
    toggleText.innerText = t("show_logs") || "Show Logs";
  }
};
window.exportData = () => {
  const data = {
    cores: localStorage.getItem("rpg_cores"),
    progression: localStorage.getItem("rpg_progression"),
    autobattle: localStorage.getItem("rpg_autobattle")
  };
  const b = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(b);
  a.download = "rpg_idle_backup.json";
  a.click();
};
window.importData = (event) => {
  const r = new FileReader();
  r.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.progression) {
        if (data.cores) localStorage.setItem("rpg_cores", data.cores);
        localStorage.setItem("rpg_progression", data.progression);
        if (data.autobattle) localStorage.setItem("rpg_autobattle", data.autobattle);
        alert(t("wipe_success") || "Data imported successfully!");
        location.reload();
      } else {
        alert("Invalid save file structure.");
      }
    } catch (err) {
      alert("Error parsing file.");
    }
  };
  r.readAsText(event.target.files[0]);
};
window.onload = () => {
  updateCoresUI();
  applyTranslations();
  console.log(`RPG Idle Initialized`);
};
window.showMenu = showMenu;
window.showVillage = showVillage;
window.showSettings = showSettings;

window.increaseStat = increaseStat;
window.showHeroSkills = showHeroSkills;
window.learnSkill = learnSkill;

    <div class="game-header">
        <button class="back-btn" onclick="window.showHeroDetails(window.currentHeroIndex)" style="padding: 8px 12px;">← <span data-i18n="btn_back">BACK</span></button>
        <h2 style="margin: 0; flex: 1; text-align: center;" data-i18n="hero_skills">Skills List</h2>
        <div style="font-size: 0.9rem; color: #ccc;"><span id="label-skills-sp" data-i18n="skill_points">Skill Points</span> <span id="hero-skills-sp">0</span></div>
    </div>
    
    <div style="display: flex; gap: 5px; padding: 10px; background: rgba(0,0,0,0.2); overflow-x: auto; white-space: nowrap;">
        <button id="skill-tab-physical" class="menu-btn primary" style="font-size: 0.8rem; padding: 5px 10px;" onclick="window.switchSkillTab('physical')" data-i18n="physical">Physical</button>
        <button id="skill-tab-magic" class="menu-btn secondary" style="font-size: 0.8rem; padding: 5px 10px;" onclick="window.switchSkillTab('magic')" data-i18n="magic">Magic</button>
        <button id="skill-tab-tricker" class="menu-btn secondary" style="font-size: 0.8rem; padding: 5px 10px;" onclick="window.switchSkillTab('tricker')" data-i18n="tricker">Tricker</button>
        <button id="skill-tab-support" class="menu-btn secondary" style="font-size: 0.8rem; padding: 5px 10px;" onclick="window.switchSkillTab('support')" data-i18n="support">Support</button>
    </div>
    <div style="flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto;">
        <div id="hero-skills-container" style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
            <!-- Skills injected here -->
        </div>
        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #444;">
        </div>
    </div>
</div>

    <div id="view-settings" class="view">
    <div class="menu-container">
        <div class="glass-card">
            <h2 class="title" data-i18n="settings_title">SETTINGS</h2>

            <div class="settings-list">
                <div class="setting-item">
                    <label data-i18n="lang">Language</label>
                    <select id="lang-selector" onchange="window.changeLanguage()">
                        <option value="es">Español</option>
                        <option value="en">English</option>
                        <option value="ca">Català</option>
                        <option value="eu">Euskara</option>
                        <option value="gl">Galego</option>
                    </select>
                </div>
            </div>

            <div class="menu-actions">
                <button class="menu-btn secondary" onclick="window.exportData()" style="margin-bottom: 10px;">
                    <span data-i18n="btn_export">EXPORT JSON</span>
                </button>
                <button class="menu-btn secondary" onclick="document.getElementById('import-input').click()" style="margin-bottom: 20px;">
                    <span data-i18n="btn_import">IMPORT JSON</span>
                </button>
                <input type="file" id="import-input" style="display:none" onchange="window.importData(event)">

                <button class="menu-btn secondary" onclick="window.clearGameData()" style="color: var(--danger); border-color: var(--danger); margin-bottom: 20px;">
                    WIPE DATA
                </button>
                <button class="menu-btn primary" onclick="window.showMenu()">
                    <span data-i18n="btn_back">BACK</span>
                </button>
            </div>
        </div>
    </div>
</div>


    <!-- Scripts -->
</body>
</html>
